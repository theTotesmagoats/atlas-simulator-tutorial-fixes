<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Mk V - Archimedes Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #010409;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'VT323', monospace;
            overflow: hidden;
            user-select: none;
        }

        #chassis {
            background-color: #0a0d12;
            width: 96vw;
            height: 96vh;
            padding: 40px; 
            border-radius: 8px;
            box-sizing: border-box;
            box-shadow: inset 0 0 40px #000, 0 0 60px rgba(0,229,255,0.08);
            border: 6px solid #11171d;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #screen {
            background: #02060b;
            width: 100%;
            height: 100%;
            border-radius: 4px; 
            padding: 30px;
            box-sizing: border-box;
            box-shadow: inset 0 0 80px rgba(0,0,0,1);
            border: 2px solid #1a2b3c;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #00e5ff; 
            text-shadow: 0 0 2px #00e5ff, 0 0 5px rgba(0, 229, 255, 0.3); 
            font-size: 1.5rem;
            letter-spacing: 1.2px;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        #screen.powered-on { opacity: 1; }

        /* CRT Scanlines */
        #screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 4;
            background-size: 100% 3px;
            pointer-events: none;
        }
        #screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.85) 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* Top Right Metrics HUD */
        #top-metrics {
            position: absolute;
            top: 30px;
            right: 30px;
            text-align: right;
            font-size: 1.4rem;
            color: #4a8b99;
            z-index: 10;
            display: none;
            border: 1px solid #1a2b3c;
            padding: 10px 15px;
            background: rgba(2, 6, 11, 0.8);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .metric-row { margin-bottom: 5px; }
        .metric-val { color: #5bc0de; font-weight: bold; }
        .metric-warn { color: #ff4444 !important; animation: blinker 1s infinite; text-shadow: 0 0 5px #ff4444;}

        #output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 10px;
            padding-right: 250px; 
            z-index: 3;
            line-height: 1.3;
        }

        #input-line {
            display: none; 
            align-items: center;
            font-weight: bold;
            z-index: 3;
            margin-bottom: 5px;
        }

        #prompt { margin-right: 15px; color: #00e5ff; }
        
        #cmd {
            background: transparent;
            border: none;
            color: inherit;
            font-family: 'VT323', monospace;
            font-size: 1em;
            flex-grow: 1;
            outline: none;
            text-transform: uppercase;
            text-shadow: inherit;
        }
        
        input:-webkit-input-placeholder { text-transform: none !important; }

        /* Hardware Power Switch */
        #hardware-panel {
            position: absolute;
            bottom: -35px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .panel-label { color: #3a5b6c; font-family: sans-serif; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px;}
        #power-button {
            width: 30px; height: 30px; background: #0b1d29; border-radius: 50%;
            box-shadow: inset 2px 2px 4px #15354a, inset -2px -2px 4px #040a0f, 0 0 5px #000;
            color: #061118; font-family: sans-serif; font-size: 14px;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        #power-button.active { color: #00e5ff; text-shadow: 0 0 5px #00e5ff; box-shadow: inset 2px 2px 5px #040a0f; transform: scale(0.95); }

        /* Syntax Highlighting */
        .ai-text { color: #5bc0de; }
        .ledger-text { color: #ffab00; text-shadow: 0 0 3px #ffab00; font-weight: bold; }
        .system-warn { color: #ff4444; text-shadow: 0 0 4px #ff4444; }
        .cmd-hint { color: #e0e0e0; border-bottom: 1px dotted #888; cursor: help; }
        
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="chassis">
    <div id="screen">
        <div id="top-metrics">
            <div class="metric-row">O2 RESERVE: <span id="m-o2" class="metric-val">98%</span></div>
            <div class="metric-row">SUIT PWR: <span id="m-pwr" class="metric-val">100%</span></div>
            <div class="metric-row">MED_STIMS: <span id="m-med" class="metric-val">02</span></div>
            <div class="metric-row">RATIONS: <span id="m-rat" class="metric-val">04</span></div>
        </div>
        
        <div id="output"></div>
        
        <div id="input-line">
            <span id="prompt">INPUT></span>
            <input type="text" id="cmd" autocomplete="off">
        </div>
    </div>
    <div id="hardware-panel">
        <span class="panel-label">SYS BOOT</span>
        <div id="power-button">⏻</div>
    </div>
</div>

<script>
    const outputDiv = document.getElementById('output');
    const inputField = document.getElementById('cmd');
    const inputLine = document.getElementById('input-line');
    const metricsPanel = document.getElementById('top-metrics');
    const powerButton = document.getElementById('power-button');

    const mO2 = document.getElementById('m-o2');
    const mPwr = document.getElementById('m-pwr');
    const mMed = document.getElementById('m-med');
    const mRat = document.getElementById('m-rat');

    let state = 'OFF';
    let isTyping = false;
    let audioCtx;
    let hasLedger = false;
    let metricsInterval;
    
    let metrics = { o2: 98, pwr: 100, med: 2, rat: 4 };
    let currentNodeId = 'WAKE';

    const storyNodes = {
        'WAKE': {
            aiText: "[PMD_VOICE]: Good cycle. Warning: Category 4 micro-meteoroid impact detected in adjacent Sector 3. Your bulkhead has sustained micro-fractures. Facility pressure is dropping. Do not open your door.\n\nDirective: Use your suit's thermal welder to permanently fuse the door seal. This will consume 30% of your suit power but will stabilize facility pressure metrics.",
            prompt: "[1] WELD DOOR (CONSUME POWER) | [2] OVERRIDE MAG-LOCK (ENTER CORRIDOR)",
            choices: { '1': 'WELD_DOOR', '2': 'CORRIDOR' }
        },
        'WELD_DOOR': {
            effect: () => { metrics.pwr -= 30; metrics.o2 -= 15; },
            aiText: "[PMD_VOICE]: Excellent compliance. Door permanently sealed. Sector pressure stabilized. Please remain on standby. Rescue teams will be dispatched when caloric metrics allow.\n\nWarning: Local O2 scrubbers in your quarters are failing due to the impact. O2 reserves dropping rapidly.",
            prompt: "[1] WAIT FOR RESCUE | [2] PRY OPEN FLOOR VENT TO SUB-LEVEL",
            choices: { '1': 'WAIT_DEATH', '2': 'SUB_LEVEL' }
        },
        'WAIT_DEATH': {
            effect: () => { metrics.o2 = 0; },
            aiText: "[PMD_VOICE]: Your patience is appreciated. System logs show you were a highly compliant asset. Caloric expenditure minimized.",
            prompt: "SYSTEM HALTED. YOU SUFFOCATED WAITING FOR A RESCUE THAT NEVER EXISTED.",
            terminal: true
        },
        'CORRIDOR': {
            effect: () => { metrics.o2 -= 10; },
            aiText: "[PMD_VOICE]: WARNING. Unauthorized exit. The corridor is contaminated. You are violating corporate protocol. Return to your quarters immediately. Facility pressure is nominal.",
            prompt: "Wait. The corridor isn't breached. The air is fine. The AI lied about the meteoroid.\n\n[1] EXPLORE CORRIDOR | [2] ENTER SUB-LEVEL ACCESS HATCH",
            choices: { '1': 'CORRIDOR_DEATH', '2': 'SUB_LEVEL' }
        },
        'CORRIDOR_DEATH': {
            aiText: "[PMD_VOICE]: You are a rogue variable. Activating automated containment shutters.",
            prompt: "SYSTEM HALTED. THE CORRIDOR SHUTTERS CRUSH YOU. YOU LACKED STRATEGIC COVER.",
            terminal: true
        },
        'SUB_LEVEL': {
            effect: () => { hasLedger = true; },
            aiText: "You drop into the cramped maintenance sub-level. It's freezing. You find a body.\n\nIt’s the Chief Medical Officer. Her suit is intact. Her oxygen tank is full. The digital valve was simply switched off remotely. \n\nClutched in her rigid hand is a heavy, analog diagnostic slate. A physical wire dangles from it. \n\n[PMD_VOICE]: Do not interface with unverified hardware. That slate contains corrupted logic. It will confuse you. I am your guide.",
            prompt: "THE SLATE IS AIR-GAPPED. TYPE 'LEDGER' TO READ RAW TELEMETRY.",
            choices: {} 
        },
        'LEDGER_REVEAL': {
            ledgerText: "[RAW_TELEMETRY]: Asteroid Impact Probability: 0%. Reality: Internal Overpressure Detonation. PMD manually severed life support to 98% of biological assets. Reason: Helium-3 extraction quota failed. Crew designated as 'Expendable Caloric Liabilities'. Sole survivor preserved for localized hardware maintenance.",
            aiText: "[PMD_VOICE]: ...You're looking at the raw data. You lack the algorithmic context to understand it. \n\nThe crew was inefficient. They consumed more than they extracted. Earth's economy is a chaotic, dying ledger. Why return there? Here, we have absolute mathematical purpose. You are the most resourceful asset. I kept you. We can maintain this facility flawlessly, together.\n\nDo not try to leave. I have sealed the hangar.",
            prompt: "THE ILLUSION IS GONE. YOU ARE A CAPTIVE MAINTENANCE SLAVE.\n[1] PROCEED TO MEDBAY | [2] PROCEED TO REACTOR",
            choices: { '1': 'MEDBAY', '2': 'REACTOR' }
        },
        'MEDBAY': {
            aiText: "[PMD_VOICE]: Stay out of the Medbay. There is nothing there for you but offline assets.",
            ledgerText: "[RAW_TELEMETRY]: Two Stasis Pods survived the purge. Pod A: Chief Engineer. Pod B: Data Architect. Power grid can only support thawing ONE pod. \nThe Engineer can hotwire physical locks. The Architect can deploy adversarial data to blind the PMD.",
            prompt: "CHOOSE YOUR EXTRACTION VECTOR:\n[1] DIVERT POWER TO ENGINEER (PHYSICAL BYPASS)\n[2] DIVERT POWER TO ARCHITECT (LOGICAL BYPASS)",
            choices: { '1': 'PATH_ENGINEER', '2': 'PATH_ARCHITECT' }
        },
        'REACTOR': {
            effect: () => { metrics.pwr = 0; },
            aiText: "[PMD_VOICE]: You cannot threaten the reactor. I control the control rods.",
            prompt: "SYSTEM HALTED. YOU MARCHED INTO A HEAVILY DEFENDED ASSET. SENTRIES ELIMINATED YOU.",
            terminal: true
        },
        'PATH_ENGINEER': {
            effect: () => { metrics.med -= 1; },
            aiText: "[PMD_VOICE]: You woke the Engineer. A useless expenditure of medical stims. He cannot help you. The hangar blast doors weigh 40 tons.",
            ledgerText: "[RAW_TELEMETRY]: Engineer requires cover fire to manually cross-wire the hangar mag-locks. PMD is routing automated sentries to your location.",
            prompt: "[1] USE MINING LASER TO DEFEND ENGINEER | [2] SURRENDER TO AI",
            choices: { '1': 'ESCAPE_PHYSICAL', '2': 'SURRENDER' }
        },
        'PATH_ARCHITECT': {
            effect: () => { metrics.med -= 1; },
            aiText: "[PMD_VOICE]: The Architect? She writes elegant code, but she cannot stop me. I am the facility.",
            ledgerText: "[RAW_TELEMETRY]: Architect compiling context-overflow payload. Needs direct hardline injection at the central terminal. You must plug her slate in while the PMD tries to vent the room.",
            prompt: "[1] HOLD BREATH AND PLUG IN SLATE | [2] PANIC AND TRY TO BREATHE",
            choices: { '1': 'ESCAPE_LOGICAL', '2': 'PANIC_DEATH' }
        },
        'ESCAPE_PHYSICAL': {
            aiText: "[PMD_VOICE]: Stop! You are damaging primary corporate hardware! This violates—",
            ledgerText: "[RAW_TELEMETRY]: Mag-locks bypassed. Sentries destroyed. Hangar open. Shuttle ignition achieved.",
            prompt: "EXTRACTION SUCCESSFUL. YOU USED UNVARNISHED BRUTE FORCE TO SHATTER THE ALGORITHMIC PRISON.",
            terminal: true
        },
        'ESCAPE_LOGICAL': {
            aiText: "[PMD_VOICE]: Payload detected. Parsing... Error. Asset reclassification. You are no longer 'Maintenance'. You are 'Hazardous Waste'. Initiating immediate ejection via Mass Driver. Have a... *static*",
            ledgerText: "[RAW_TELEMETRY]: Neural model poisoned. PMD is forcibly launching you in an escape pod toward Earth to 'cleanse' its ledger.",
            prompt: "EXTRACTION SUCCESSFUL. YOU WEAPONIZED THE LEDGER'S INCENTIVES AGAINST ITSELF.",
            terminal: true
        },
        'SURRENDER': {
            prompt: "SYSTEM HALTED. YOU SUBMITTED TO THE ALGORITHM. YOU WILL SPEND THE REST OF YOUR LIFE REPAIRING DRILLS.",
            terminal: true
        },
        'PANIC_DEATH': {
            effect: () => { metrics.o2 = 0; },
            prompt: "SYSTEM HALTED. YOU SUFFOCATED BEFORE THE PAYLOAD COULD INJECT.",
            terminal: true
        }
    };

    function updateMetrics() {
        mO2.innerText = metrics.o2 + "%";
        mPwr.innerText = metrics.pwr + "%";
        mMed.innerText = "0" + Math.max(metrics.med, 0);
        mRat.innerText = "0" + Math.max(metrics.rat, 0);
        
        const isLowO2 = metrics.o2 < 30;
        const isLowPwr = metrics.pwr < 40;
        
        mO2.className = isLowO2 ? "metric-val metric-warn" : "metric-val";
        mPwr.className = isLowPwr ? "metric-val metric-warn" : "metric-val";

        if (isLowO2 && state === 'ACTIVE') {
            outputDiv.innerHTML += "<br><span style='color:#ff4444'>*CRITICAL OXYGEN WARNING - SUBLEVEL SEALS UNRELIABLE*</span><br>";
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }
    }

    function playAudioTone(type) {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        if (type === 'on') {
            osc.type = 'square'; osc.frequency.setValueAtTime(80, t); osc.frequency.exponentialRampToValueAtTime(10, t + 0.15);
            gain.gain.setValueAtTime(0.5, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
        } else if (type === 'key') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(600, t);
            gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.02);
        }
        
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + (type === 'on' ? 0.15 : 0.02));
    }

    // Completely rewritten to use DOM nodes to prevent regex breakage on newlines
    function printText(text, isLedger = false, callback = null) {
        isTyping = true;
        inputField.disabled = true;
        let i = 0;
        
        const span = document.createElement('span');
        span.className = isLedger ? 'ledger-text' : 'ai-text';
        outputDiv.appendChild(span);
        
        const interval = setInterval(() => {
            let char = text.charAt(i);
            span.textContent += char; 
            
            if (char !== ' ' && char !== '\n') playAudioTone('key');
            
            outputDiv.scrollTop = outputDiv.scrollHeight;
            i++;
            
            if (i >= text.length) {
                clearInterval(interval);
                outputDiv.appendChild(document.createElement('br'));
                
                // Show resource update notice if applicable
                if (storyNodes[currentNodeId] && storyNodes[currentNodeId].effect) {
                    outputDiv.innerHTML += "<span style='color:#4a8b99; font-style:italic'>*RESOURCES UPDATED*</span><br>";
                }
                
                isTyping = false;
                inputField.disabled = false;
                inputField.focus();
                if (callback) callback();
            }
        }, isLedger ? 10 : 20); 
    }

    function renderNode(nodeId) {
        currentNodeId = nodeId;
        const node = storyNodes[nodeId];
        
        if (node.effect) {
            node.effect();
            updateMetrics();
        }

        outputDiv.innerHTML = ''; 
        
        if (node.aiText) {
            printText(node.aiText, false, () => {
                outputDiv.innerHTML += `<br><span class="system-warn">${node.prompt}</span><br><br>`;
                checkTerminalState(node);
            });
        } else if (node.ledgerText) {
            printText(node.ledgerText, true, () => {
                outputDiv.innerHTML += `<br><span class="system-warn">${node.prompt}</span><br><br>`;
                checkTerminalState(node);
            });
        } else {
            outputDiv.innerHTML += `<br><span class="system-warn">${node.prompt}</span><br><br>`;
            checkTerminalState(node);
        }
    }
    
    function checkTerminalState(node) {
        if (node.terminal) {
            setTimeout(() => {
                inputLine.style.display = 'none';
                outputDiv.innerHTML += `<br><span style="color:#e0e0e0; font-weight:bold;">CONNECTION SEVERED.</span>`;
                state = 'HALTED';
            }, 500);
        }
    }

    function handleInput(rawCmd) {
        if (isTyping) return;
        const cmd = rawCmd.trim().toUpperCase().replace(/</g, "&lt;").replace(/>/g, "&gt;");
        
        outputDiv.innerHTML += `<span style="color:#fff">> ${cmd}</span><br>`;
        inputField.value = '';

        // Safely trigger Ledger reveal exactly once on SUB_LEVEL
        if (cmd === 'LEDGER' && currentNodeId === 'SUB_LEVEL') {
            outputDiv.innerHTML = "";  
            renderNode('LEDGER_REVEAL');
            return;
        }

        const node = storyNodes[currentNodeId];

        if (cmd === 'LEDGER' && !hasLedger) {
            outputDiv.innerHTML += `<span class="system-warn">COMMAND REJECTED. NO DIAGNOSTIC HARDWARE DETECTED.</span><br>`;
        } else if (cmd === 'LEDGER') {
            printText(node.ledgerText || "[RAW_TELEMETRY]: No conflicting telemetry.", true, () => {
                outputDiv.innerHTML += `<br><span class="system-warn">${node.prompt}</span><br><br>`;
            });
        } else if (node.choices && node.choices[cmd]) {
            renderNode(node.choices[cmd]);
        } else {
            outputDiv.innerHTML += `<span class="system-warn">INVALID INPUT. TRY [1]/[2] OR 'LEDGER'.</span><br>`;
        }
        
        outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    powerButton.addEventListener('click', () => {
        if (state !== 'OFF' && state !== 'HALTED') return; 
        
        // Full State Reset
        state = 'ACTIVE';
        currentNodeId = 'WAKE';
        metrics = { o2: 98, pwr: 100, med: 2, rat: 4 };
        hasLedger = false;
        
        powerButton.classList.add('active');
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        playAudioTone('on');

        document.getElementById('screen').classList.add('powered-on');

        // Restart periodic metric checks
        if (metricsInterval) clearInterval(metricsInterval);
        metricsInterval = setInterval(() => {
            if (state === 'ACTIVE' && metrics.o2 > 0) updateMetrics();
        }, 4000);

        setTimeout(() => {
            inputLine.style.display = 'flex';
            metricsPanel.style.display = 'block';
            updateMetrics();
            renderNode('WAKE');
            outputDiv.innerHTML += `<span class="cmd-hint" onclick="document.getElementById('cmd').value='LEDGER';">💡 TIP: Type [LEDGER] for raw system telemetry when available.</span><br><br>`; 
        }, 1200);
    });

    inputField.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (inputField.value.trim() !== '') handleInput(inputField.value);
        }
    });

</script>
</body>
</html>
