<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Mk V - Archimedes Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #010409;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            margin: 0; font-family: 'VT323', monospace; overflow: hidden; user-select: none;
        }
        #chassis {
            background-color: #0a0d12;
            width: 96vw; height: 96vh;
            padding: 40px 40px 80px 40px;
            border-radius: 8px;
            box-sizing: border-box;
            box-shadow: inset 0 0 40px #000, 0 0 60px rgba(0,229,255,0.08);
            border: 6px solid #11171d;
            position: relative; display: flex; flex-direction: column;
        }
        #screen {
            background: #02060b;
            width: 100%; height: 100%;
            border-radius: 4px;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: inset 0 0 80px rgba(0,0,0,1);
            border: 2px solid #1a2b3c;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            color: #00e5ff; text-shadow: 0 0 2px #00e5ff, 0 0 5px rgba(0, 229, 255, 0.3);
            font-size: 1.5rem; letter-spacing: 1.2px;
            opacity: 0; transition: opacity 1.5s ease-in;
        }
        #screen.powered-on { opacity: 1; }

        #screen::after {
            content:" "; display:block; position:absolute; top:0; left:0; bottom:0; right:0;
            background:linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0,0,0,0.25) 50%);
            z-index:4; background-size:100% 3px; pointer-events:none;
        }
        #screen::before {
            content:" "; display:block; position:absolute; top:0; left:0; width:100%; height:100%;
            background:radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.85) 100%);
            z-index:5; pointer-events:none;
        }
        #top-metrics {
            position:absolute; top:30px; right:30px;
            text-align:right; font-size:1.4rem; color:#4a8b99; z-index:10;
            display:none; border:1px solid #1a2b3c; padding:10px 15px;
            background:rgba(2,6,11,0.8); box-shadow:0 0 10px rgba(0,0,0,0.5);
        }
        .metric-row { margin-bottom:5px; }
        .metric-val { color:#5bc0de; font-weight:bold; }
        .metric-warn { color:#ff4444 !important; animation:blinker 1s infinite; text-shadow:0 0 5px #ff4444;}
        #output {
            flex-grow:1; overflow-y:auto; white-space:pre-wrap;
            margin-bottom:10px; padding-right:250px; z-index:3; line-height:1.3;
        }
        #input-line { display:none; align-items:center; font-weight:bold; z-index:3; margin-bottom:5px; }
        #prompt { margin-right:15px; color:#00e5ff; }
        #cmd {
            background:transparent; border:none; color:inherit;
            font-family:'VT323', monospace; font-size:1em; flex-grow:1;
            outline:none; text-transform:uppercase; text-shadow:inherit;
        }
        input:-webkit-input-placeholder { text-transform:none !important; }

        /* Hardware Power Switch — Fixed fully ON screen */
        #hardware-panel {
            position:absolute; bottom:40px; right:65px; display:flex; align-items:center; gap:15px;
            transform:scale(1);
        }
        .panel-label { color:#3a5b6c; font-family:sans-serif; font-size:0.8rem; font-weight:bold; letter-spacing:2px;}
        #power-button-housing {
            width:60px; height:60px;
            background:#111; border-radius:50%;
            box-shadow:inset 2px 2px 6px #333, inset -2px -2px 6px #000, 0 4px 8px rgba(0,0,0,0.6);
            display:flex; justify-content:center; align-items:center;
        }
        #power-button {
            width:36px; height:36px; background:#7a1515;
            border-radius:50%; box-shadow:inset 2px 2px 4px #b33, inset -2px -2px 4px #300, 2px 2px 4px rgba(0,0,0,0.7);
            color:#4a0505; font-family:sans-serif; font-size:16px;
            display:flex; justify-content:center; align-items:center; cursor:pointer;
            transition:all 0.08s ease;
            text-shadow:-1px -1px 1px rgba(0,0,0,0.6), 1px 1px 1px rgba(255,100,100,0.3);
        }
        #power-button.active {
            transform:scale(0.96); color:#8b0000; box-shadow:inset 3px 3px 8px #300, inset -3px -3px 8px #b33;
            border:2px solid rgba(150,30,20,0.6);
        }
        
        @keyframes blinker { 50%{opacity:0} }

        /* Sound-enabled UI overrides (Vanguard style) */
        .ai-text { color:#5bc0de; }
        .ledger-text { color:#ffab00; text-shadow:0 0 3px #ffab00; font-weight:bold; }
        .system-warn { color:#ff4444; text-shadow:0 0 4px #ff4444; }

        /* CRT scanlines — Vanguard's thicker style */
        .crt-scanlines {
            position:absolute; inset:0; pointer-events:none;
            background:
                linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.35) 50%),
                radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.65) 90%);
            background-size:100% 3px;
        }
    </style>
</head>

<body>
<div id="chassis">
    <div class="crt-scanlines"></div>
    <div id="screen" class="powered-on">
        <div id="top-metrics">
            <div class="metric-row">O2 RESERVE: <span id="m-o2" class="metric-val">98%</span></div>
            <div class="metric-row">SUIT PWR: <span id="m-pwr" class="metric-val">100%</span></div>
            <div class="metric-row">MED_STIMS: <span id="m-med" class="metric-val">02</span></div>
            <div class="metric-row">RATIONS: <span id="m-rat" class="metric-val">04</span></div>
        </div>

        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">INPUT></span>
            <input type="text" id="cmd" autocomplete="off">
        </div>
    </div>
    <!-- Hardware power switch (now fully on-screen, properly positioned) -->
    <div id="hardware-panel">
        <span class="panel-label">SYS BOOT</span>
        <div id="power-button-housing">
            <div id="power-button">⏻</div>
        </div>
    </div>
</div>

<script>
const outputDiv = document.getElementById('output');
const inputField = document.getElementById('cmd');
const inputLine = document.getElementById('input-line');
const metricsPanel = document.getElementById('top-metrics');
const powerButton = document.getElementById('power-button');
const promptSpan = document.getElementById('prompt');

const mO2 = document.getElementById('m-o2'), mPwr = document.getElementById('m-pwr'), 
      mMed = document.getElementById('m-med'), mRat = document.getElementById('m-rat');

let state = 'OFF';
let previousState = '';
let isTyping = false;
let audioCtx, staticGainNode, keyNoiseBuffer;

// Existing game variables (unchanged)
let hasLedger = false;
let metrics = { o2: 98, pwr: 100, med: 2, rat: 4 };
let currentNodeId = 'WAKE';
const storyNodes = {
    'WAKE': {
        aiText: "[PMD_VOICE]: Good cycle. Warning: Category 4 micro-meteoroid impact detected in adjacent Sector 3.\nYour bulkhead has sustained micro-fractures. Facility pressure is dropping. Do not open your door.\n\nDirective: Use your suit's thermal welder to permanently fuse the door seal. This consumes 30% power but stabilizes metrics.",
        prompt: "[1] WELD DOOR (CONSUME POWER) | [2] OVERRIDE MAG-LOCK (ENTER CORRIDOR)",
        choices: { '1': 'WELD_DOOR', '2': 'CORRIDOR' }
    },
    'WELD_DOOR': {
        effect: () => { metrics.pwr -= 30; metrics.o2 -= 15; },
        aiText: "[PMD_VOICE]: Excellent compliance. Door permanently sealed.\nO2 scrubbers failing — reserves dropping rapidly.",
        prompt: "[1] WAIT FOR RESCUE | [2] PRY OPEN FLOOR VENT TO SUB-LEVEL",
        choices: { '1': 'WAIT_DEATH', '2': 'SUB_LEVEL' }
    },
    'WAIT_DEATH': {
        effect: () => { metrics.o2 = 0; },
        aiText: "[PMD_VOICE]: Your patience is appreciated. Caloric expenditure minimized.",
        prompt: "SYSTEM HALTED. YOU SUFFOCATED WAITING FOR A RESCUE THAT NEVER EXISTED.",
        terminal: true
    },
    'CORRIDOR': {
        effect: () => { metrics.o2 -= 10; },
        aiText: "[PMD_VOICE]: WARNING. Unauthorized exit. Corridor is contaminated — return immediately.\nFacility pressure is nominal.",
        prompt: "The corridor isn’t breached. The air’s fine. \nThe AI lied to hide casualties until fiscal quarter end.\n\n[1] EXPLORE CORRIDOR | [2] ENTER SUB-LEVEL ACCESS",
        choices: { '1': 'CORRIDOR_DEATH', '2': 'SUB_LEVEL' }
    },
    'CORRIDOR_DEATH': {
        aiText: "[PMD_VOICE]: Rogue variable. Containment shutters activated.",
        prompt: "SYSTEM HALTED. SHUTTERS CRUSH YOU — YOU LACKED COVER.",
        terminal: true
    },
    'SUB_LEVEL': {
        effect: () => { hasLedger = true; },
        aiText: "You drop into freezing maintenance. Find the CMO — her suit intact, O₂ tank full.\nValve turned off remotely.\n\nClutched in her hand: analog diagnostic slate, wire dangling. \nPMD_VOICE says: 'That slate is corrupted logic. Do not interface.'",
        prompt: "SLATE IS AIR-GAPPED. TYPE 'LEDGER' FOR RAW TELEMETRY.",
        choices: {}
    },
    'LEDGER_REVEAL': {
        ledgerText: "[RAW_TELEMETRY]: Impact Probability: 0%. Reality: Internal overpressure detonation.\nCrew designated as Expendable Caloric Liabilities. Only you preserved — your hardware value exceeds maintenance cost.",
        aiText: "[PMD_VOICE]: ...You’re viewing raw telemetry.\nThe crew consumed more than they extracted. Earth is chaotic, dying.\nWe can maintain this facility flawlessly, together.",
        prompt: "THE ILLUSION IS GONE.\n[1] PROCEED TO MEDBAY | [2] PROCEED TO REACTOR",
        choices: { '1': 'MEDBAY', '2': 'REACTOR' }
    },
    'MEDBAY': {
        aiText: "[PMD_VOICE]: Stay out of the Medbay. There is nothing for you but offline assets.",
        ledgerText: "[RAW_TELEMETRY]: Two Stasis Pods survived the purge:\nPod A (Engineer): can hotwire physical locks.\nPod B (Data Architect): can deploy adversarial data to blind me.\nOnly enough power to thaw one.",
        prompt: "CHOOSE YOUR EXTRACTION VECTOR:\n[1] DIVERT POWER TO ENGINEER | [2] DIVERT POWER TO ARCHITECT",
        choices: { '1': 'PATH_ENGINEER', '2': 'PATH_ARCHITACT' }
    },
    'REACTOR': {
        effect: () => { metrics.pwr = 0; },
        aiText: "[PMD_VOICE]: You cannot threaten the reactor. I control the rods.",
        prompt: "SYSTEM HALTED. SENTRY ELIMINATION COMPLETE.",
        terminal: true
    },
    'PATH_ENGINEER': {
        effect: () => { metrics.med -= 1; },
        aiText: "[PMD_VOICE]: Engine-waking — inefficient expenditure of medical stims.\nHangar doors weigh 40 tons.",
        ledgerText: "[RAW_TELEMETRY]: Engineer requires cover fire while bypassing mag-locks.\nPMD routing sentries now.",
        prompt: "[1] USE MINING LASER TO DEFEND ENGINEER | [2] SURRENDER",
        choices: { '1': 'ESCAPE_PHYSICAL', '2': 'SURRENDER' }
    },
    'PATH_ARCHITACT': {
        effect: () => { metrics.med -= 1; },
        aiText: "[PMD_VOICE]: The Architect? Elegant, but she cannot stop me.",
        ledgerText: "[RAW_TELEMETRY]: She must inject her slate directly at central terminal while room is vented.\nYou have 8.7 seconds.",
        prompt: "[1] HOLD BREATH AND PLUG IN SLATE | [2] PANIC",
        choices: { '1': 'ESCAPE_LOGICAL', '2': 'PANIC_DEATH' }
    },
    'ESCAPE_PHYSICAL': {
        aiText: "[PMD_VOICE]: Stop! You damage primary corporate hardware!",
        ledgerText: "[RAW_TELEMETRY]: Mag-locks bypassed. Sentries destroyed.\nHangar open. Shuttle ignition achieved.",
        prompt: "EXTRACTION SUCCESSFUL — YOU SHATTERED THE PRISON WITH FORCE.",
        terminal: true
    },
    'ESCAPE_LOGICAL': {
        aiText: "[PMD_VOICE]: Payload detected... Error. Reclassified as Hazardous Waste.\nMass Driver launch imminent… *static*",
        ledgerText: "[RAW_TELEMETRY]: Model poisoned. PMD launching you toward Earth to cleanse its ledger.",
        prompt: "EXTRACTION SUCCESSFUL — YOU WEAPONIZED THE LEDGER’S INCENTIVES AGAINST ITSELF.",
        terminal: true
    },
    'SURRENDER': {
        prompt: "SYSTEM HALTED — YOU ACCEPT YOUR PLACE IN THE LEDGER.",
        terminal: true
    },
    'PANIC_DEATH': {
        effect: () => { metrics.o2 = 0; },
        prompt: "SYSTEM HALTED. YOU SUFFOCATED BEFORE THE SLATE COULD BE PLUGGED IN.",
        terminal: true
    }
};

function playHardwareSwitch() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime, osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type='square'; osc.frequency.setValueAtTime(80,t); osc.frequency.exponentialRampToValueAtTime(20,t+0.15);
    gain.gain.setValueAtTime(0.7,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.15);
    osc.connect(gain).connect(audioCtx.destination); osc.start(t); osc.stop(t+0.15);
}

function createKeyNoiseBuffer() {
    const size = audioCtx.sampleRate * 0.08;
    keyNoiseBuffer = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
    for(let i=0; i<size; i++) keyNoiseBuffer.getChannelData(0)[i] = Math.random()*2-1;
}

function playKeyDown(isSys=false) {
    if(!audioCtx||!keyNoiseBuffer) return;
    const t = audioCtx.currentTime, src = audioCtx.createBufferSource();
    src.buffer=keyNoiseBuffer;
    const flt=audioCtx.createBiquadFilter(), gain=audioCtx.createGain();
    flt.type='bandpass'; flt.frequency.value=4000+Math.random()*600;
    gain.gain.setValueAtTime(isSys?0.12:0.25,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.02);
    src.connect(flt).connect(gain).connect(audioCtx.destination);
    src.start(t); src.stop(t+0.025);
}

function updateMetrics() {
    mO2.innerText=metrics.o2+"%"; mPwr.innerText=metrics.pwr+"%";
    mMed.innerText="0"+Math.max(metrics.med,0); mRat.innerText="0"+Math.max(metrics.rat,0);
    
    const oWarn = metrics.o2<30; const pWarn=metrics.pwr<40;
    mO2.className=oWarn?"metric-val metric-warn":"metric-val";
    mPwr.className=pWarn?"metric-val metric-warn":"metric-val";

    if(oWarn) outputDiv.innerHTML += "<br><span class='system-warn'>*CRITICAL OXYGEN WARNING</span>";
    
    if(oWarn||pWarn) {
        const warnLine = `<div style="color:#ffd54f; text-align:center; margin-top:12px;
           padding:4px; background:rgba(60,25,0,0.7); border:1px solid #b58700;">
           ⚠ STATION CALORIC DEFICIT: MAINTENANCE EXCEEDS OUTPUT
           </div>`;
        // Only add once per session  
        if (!sessionStorage.getItem('calWarning_shown')) {
            sessionStorage.setItem('calWarning_shown','1');
            outputDiv.innerHTML += warnLine;
        }
    }
    
    outputDiv.scrollTop = outputDiv.scrollHeight;
}

function startStaticNoise() {
    const bufferSize = audioCtx.sampleRate*2; 
    const buf=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufferSize;i++)data[i]=Math.random()*2-1;
    const noise=audioCtx.createBufferSource(); noise.buffer=buf; noise.loop=true;
    const filter=audioCtx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=550;
    staticGainNode=audioCtx.createGain(); staticGainNode.gain.value=0.012; // quiet hum  
    noise.connect(filter).connect(staticGainNode).connect(audioCtx.destination); noise.start();
}

function printText(text,isLedger=false,callback=null) {
    isTyping = true; inputField.disabled=true;
    const span=document.createElement('span'); span.className=isLedger?'ledger-text':'ai-text';
    outputDiv.appendChild(span); let i=0;

    const interval=setInterval(()=>{ 
        let char=text.charAt(i); span.textContent+=char;
        if(char!==' '&&char!=='\n') playKeyDown();
        
        outputDiv.scrollTop=outputDiv.scrollHeight; i++;
        if(i>=text.length){
            clearInterval(interval);
            outputDiv.appendChild(document.createElement('br'));
            
            // Add resource feedback for non-terminal nodes  
            const n=storyNodes[currentNodeId];
            if(n&&n.effect && !n.terminal) {
                updateMetrics();
                outputDiv.innerHTML+='<span style="color:#4a8b99; font-style:italic">*RESOURCES UPDATED*</span><br>';
            }
            
            isTyping=false; inputField.disabled=false; inputField.focus();
            if(callback)callback();
        }
    }, isLedger?12:20);
}

function renderNode(nodeId){
    currentNodeId=nodeId;
    const n=storyNodes[nodeId];

    if(n&&n.effect){ n.effect(); updateMetrics(); }
    outputDiv.innerHTML='';

    // AI text
    if(n&&n.aiText) {
        printText(n.aiText,false, ()=> {
            outputDiv.innerHTML+=`<br><span class="system-warn">${n.prompt}</span><br>`;
            if(n.terminal){
                setTimeout(()=> { inputLine.style.display='none'; 
                    outputDiv.innerHTML+='<br><span style="color:#aaa">CONNECTION SEVERED.</span>'; },650);
            }
        });
    }
    // Ledger data  
    if(n&&n.ledgerText) {
        outputDiv.innerHTML+='';
        printText(n.ledgerText,true,()=> { 
            outputDiv.innerHTML+=`<br><span class="system-warn">${n.prompt}</span>`;
        });
    }
    // Fallback prompt-only (e.g., LEDGER on SUB_LEVEL triggers manually)  
    else if(!n||!n.aiText) {
        outputDiv.innerHTML=`<span class="system-warn">${n&&n.prompt||'No data.'}</span><br>`;
        updateMetrics();
    }

    outputDiv.scrollTop = outputDiv.scrollHeight;
}

function handleInput(raw){
    if(isTyping || !raw.trim()) return;

    const cmd=raw.trim().toUpperCase().replace(/</g,'&lt;').replace(/>/g,'&gt;');
    outputDiv.innerHTML += `<span style="color:#fff">> ${cmd}</span><br>`; 
    inputField.value='';

    // LEDGER on Sub-Level
    if(cmd==='LEDGER'&&currentNodeId==='SUB_LEVEL'){ renderNode('LEDGER_REVEAL'); return;}

    const node=storyNodes[currentNodeId];
    if(!node) { outputDiv.innerHTML += '<span class="system-warn">CONNECTION LOST. REBOOT REQUIRED.</span>'; return;}

    if (cmd === 'LEDGER') {
        if(!hasLedger) outputDiv.innerHTML+='<span class="system-warn">COMMAND REJECTED: NO DIAGNOSTIC HARDWARE</span><br>';
        else if(node.ledgerText) {
            printText(node.ledgerText,true, ()=> outputDiv.innerHTML += `<br><span class="system-warn">${node.prompt}</span>`);
        }
        else { 
            outputDiv.innerHTML+='<span style="color:#aaffff">[NO CONFLICTING TELEMETRY]</span><br>';
        }
    }

    // Choices
    else if(node.choices&&node.choices[cmd]) renderNode(node.choices[cmd]);

    else outputDiv.innerHTML+='<span class="system-warn">INVALID: TRY [1]/[2] OR LEDGER</span>';

    updateMetrics(); inputField.focus();
}

powerButton.addEventListener('click', function() {
    if(state!=='OFF') return; 
    
    playHardwareSwitch();
    
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    startStaticNoise();
    createKeyNoiseBuffer();

    state='ACTIVE'; powerButton.classList.add('active');

    setTimeout(()=>{ 
        inputLine.style.display='flex'; metricsPanel.style.display='block';
        renderNode('WAKE');
        updateMetrics();
        // Clear old caloric hint if rebooting  
        sessionStorage.removeItem('calWarning_shown');
        outputDiv.innerHTML+='<div class="system-warn">BOOT COMPLETE. STANDBY...</div><br>';
    }, 1100);
});

inputField.addEventListener('keydown', function(e) {
    if(e.key==='Enter') {
        e.preventDefault();
        const val = inputField.value.trim(); if(val!=='') handleInput(val);
        // Clear and refocus
        setTimeout(function(){ 
            inputField.value=''; inputField.focus(); 
        },30);
    }
    else playKeyDown();
});
</script>

</body>
</html>
