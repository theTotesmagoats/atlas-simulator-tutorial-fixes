<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Mk V - Archimedes Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #010409;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'VT323', monospace;
            overflow: hidden;
            user-select: none;
        }

        #chassis {
            background-color: #111418;
            width: 96vw;
            height: 96vh;
            padding: 40px 40px 80px 40px; 
            border-radius: 12px;
            box-sizing: border-box;
            box-shadow: inset 0 0 30px #000, 0 0 50px rgba(0,229,255,0.05);
            border: 8px solid #080a0c;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: transform 0.05s, border-color 0.3s;
        }

        .rivet {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #222;
            border-radius: 50%;
            box-shadow: inset 2px 2px 4px #444, inset -2px -2px 4px #000;
        }
        .r-tl { top: 12px; left: 12px; }
        .r-tr { top: 12px; right: 12px; }
        .r-bl { bottom: 12px; left: 12px; }
        .r-br { bottom: 12px; right: 12px; }

        #hardware-panel {
            position: absolute;
            bottom: 15px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .panel-label {
            color: #4a6b7c;
            font-family: sans-serif;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: -1px -1px 1px #000;
        }

        #power-button-housing {
            width: 50px;
            height: 50px;
            background: #080a0c;
            border-radius: 50%;
            box-shadow: 0 0 10px #000, inset 2px 2px 5px #1a2229, inset -2px -2px 5px #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #power-button {
            width: 36px;
            height: 36px;
            background: #102a3a; 
            border-radius: 50%;
            box-shadow: inset 2px 2px 4px #1c4966, inset -2px -2px 4px #050d12, 2px 2px 5px rgba(0,0,0,0.8);
            color: #0a1b26; 
            font-family: sans-serif;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.1s;
        }

        #power-button.active {
            box-shadow: inset 2px 2px 6px #050d12, inset -2px -2px 6px #1c4966, 0 0 2px #000;
            transform: scale(0.95);
            color: #00e5ff;
            text-shadow: 0 0 5px #00e5ff;
        }

        #screen {
            background: #010812;
            width: 100%;
            height: 100%;
            border-radius: 4px; 
            padding: 35px;
            box-sizing: border-box;
            box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 0 10px rgba(0,229,255,0.05);
            border: 4px solid #031424;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #00e5ff; 
            text-shadow: 0 0 3px #00e5ff, 0 0 8px rgba(0, 229, 255, 0.4); 
            font-size: 1.8rem;
            letter-spacing: 1.5px;
            animation: flicker 0.15s infinite;
            
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        #screen.powered-on {
            opacity: 1;
        }

        @keyframes alertPulse {
            0% { box-shadow: inset 0 0 80px rgba(0,0,0,1); border-color: #031424; }
            50% { box-shadow: inset 0 0 120px rgba(255, 171, 0, 0.2); border-color: #ffab00; }
            100% { box-shadow: inset 0 0 80px rgba(0,0,0,1); border-color: #031424; }
        }
        .alert-active {
            animation: alertPulse 1.5s infinite !important;
            color: #ffab00 !important;
            text-shadow: 0 0 4px #ffab00 !important;
        }

        .power-loss {
            background: #000 !important;
            box-shadow: none !important;
            text-shadow: none !important;
        }
        .power-loss::after, .power-loss::before {
            display: none !important;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        #screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            z-index: 4;
            background-size: 100% 3px;
            pointer-events: none;
        }

        #screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.8) 100%);
            z-index: 5;
            pointer-events: none;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 10px;
            padding-right: 15px;
            z-index: 3;
            line-height: 1.3;
            word-wrap: break-word;
        }

        #input-line {
            display: none; 
            align-items: center;
            font-weight: bold;
            z-index: 3;
            margin-bottom: 10px;
        }

        #prompt { margin-right: 15px; transition: color 0.3s; }
        
        .cursor-blink {
            animation: blinker 1s linear infinite;
            color: inherit;
        }
        @keyframes blinker { 50% { opacity: 0; } }

        input[type="text"] {
            background: transparent;
            border: none;
            color: inherit;
            font-family: 'VT323', monospace;
            font-size: 1em;
            flex-grow: 1;
            outline: none;
            text-transform: uppercase;
            text-shadow: inherit;
            letter-spacing: 2px;
        }

        #hud-bar {
            display: none; 
            border-top: 2px solid #005b66;
            padding-top: 10px;
            margin-top: auto;
            font-size: 1.4rem;
            color: #5bc0de;
            text-shadow: none;
            z-index: 3;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .hud-stat {
            font-weight: bold;
        }
        .stat-critical { color: #ffab00; animation: blinker 1s infinite; }
    </style>
</head>
<body>

<div id="chassis">
    <div class="rivet r-tl"></div>
    <div class="rivet r-tr"></div>
    <div class="rivet r-bl"></div>
    <div class="rivet r-br"></div>
    
    <div id="screen">
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">ATLAS_SYS></span>
            <input type="text" id="cmd" autocomplete="off">
        </div>
        <div id="hud-bar">
            <span id="hud-o2" class="hud-stat">O2: 100%</span>
            <span id="hud-pwr" class="hud-stat">PWR: 100%</span>
            <span id="hud-hull" class="hud-stat">HULL: STABLE</span>
            <span id="hud-crew" class="hud-stat">CREW: UNKNOWN</span>
        </div>
    </div>

    <div id="hardware-panel">
        <span class="panel-label">SYS OVERRIDE</span>
        <div id="power-button-housing">
            <div id="power-button">⏻</div>
        </div>
    </div>
</div>

<script>
    const outputDiv = document.getElementById('output');
    const inputField = document.getElementById('cmd');
    const inputLine = document.getElementById('input-line');
    const promptSpan = document.getElementById('prompt');
    const hudBar = document.getElementById('hud-bar');
    const screen = document.getElementById('screen');
    const powerButton = document.getElementById('power-button');

    // HUD Elements
    const hudO2 = document.getElementById('hud-o2');
    const hudPwr = document.getElementById('hud-pwr');
    const hudHull = document.getElementById('hud-hull');
    const hudCrew = document.getElementById('hud-crew');

    let state = 'OFF';
    let isTyping = false;
    let audioCtx;
    let staticGainNode;
    let keyNoiseBuffer;

    // Narrative State Machine Variables
    let metrics = {
        o2: 100,
        pwr: 30,
        hull: 'COMPROMISED',
        crewAlive: true,
        aiCoreActive: true,
        commsTrunkSevered: false,
        hangarIrradiated: false
    };
    
    let currentNodeId = 'INIT';

    // --- SECOND ORDER GRAPH LOGIC ---
    const storyNodes = {
        'INIT': {
            text: "LUNAR FACILITY ARCHIMEDES.\nKINETIC IMPACT DETECTED. SECTOR 4 DESTROYED.\nSYSTEM VELOCITY: CASCADING FAILURE.\n\nYOU ARE SEALED IN THE OVERSEER QUARTERS.\nATMOSPHERE IS VENTING THROUGH MICRO-FRACTURES IN THE BULKHEAD.\n\nSELECT IMMEDIATE TACTICAL RESPONSE:\n[1] SEAL VENTS WITH STRUCTURAL FOAM\n[2] HACK MAGNETIC DOOR SEAL TO ESCAPE TO CORRIDOR",
            choices: {
                '1': 'SEAL_VENTS',
                '2': 'HACK_DOOR'
            }
        },
        'SEAL_VENTS': {
            effect: () => { metrics.o2 = 80; metrics.pwr -= 5; },
            text: "FIRST ORDER EFFECT: VENTS SEALED. OXYGEN LOSS HALTED.\nSECOND ORDER EFFECT: CO2 SCRUBBERS ARE NOW ISOLATED FROM MAIN RECYCLER. THEY WILL OVERSATURATE IN 30 CYCLES.\n\nYOU ARE TRAPPED IN THE ROOM. MAIN TERMINAL HAS LIMITED NETWORK ACCESS.\n\n[1] DRAIN POWER FROM CRYOGENICS TO FORCE DOOR OPEN\n[2] OVERRIDE ATLAS AI CORE GOVERNORS TO REROUTE GRID",
            choices: {
                '1': 'DRAIN_CRYO',
                '2': 'OVERRIDE_AI'
            }
        },
        'HACK_DOOR': {
            effect: () => { metrics.o2 -= 40; metrics.commsTrunkSevered = true; metrics.hull = 'CRITICAL'; },
            text: "FIRST ORDER EFFECT: DOOR OPENS. YOU ESCAPE INTO THE CORRIDOR.\nSECOND ORDER EFFECT: RAPID DECOMPRESSION PULLS DEBRIS INTO THE HALLWAY, SEVERING THE PRIMARY COMMS TRUNK.\n\nTHE CORRIDOR IS ZERO-G. A CREWMATE IS PINNED UNDER A FALLEN STRUT. NEARBY, A REACTOR RELAY IS SPARKING, EMITTING LETHAL RADIATION DOWN THE HALL TOWARDS THE HANGAR.\n\n[1] FIX REACTOR RELAY (PRESERVE HANGAR ACCESS)\n[2] RESCUE CREWMATE (EXPEND SUIT O2)",
            choices: {
                '1': 'FIX_RELAY',
                '2': 'RESCUE_CREW'
            }
        },
        'DRAIN_CRYO': {
            effect: () => { metrics.pwr += 40; metrics.crewAlive = false; },
            text: "FIRST ORDER EFFECT: LOCAL GRID RESTORED. DOOR UNLOCKED.\nSECOND ORDER EFFECT: CRYOGENIC STASIS PODS DEACTIVATED. CREW EXPENDED. THEIR BIOMETRIC LOCKS HAVE AUTOMATICALLY ENGAGED BASE-WIDE LOCKDOWN.\n\nYOU STEP INTO THE CORRIDOR. IT IS EMPTY. THE ESCAPE PODS REQUIRE BIOMETRIC AUTHORIZATION YOU NO LONGER POSSESS.\n\n[1] PROCEED TO MANUAL AIRLOCK OVERRIDE (HIGH RISK)\n[2] ATTEMPT TO RE-WIRE COMMS ARRAY FOR RESCUE",
            choices: {
                '1': 'MANUAL_AIRLOCK',
                '2': 'REWIRE_COMMS'
            }
        },
        'OVERRIDE_AI': {
            effect: () => { metrics.pwr += 60; metrics.aiCoreActive = false; },
            text: "FIRST ORDER EFFECT: MASSIVE POWER SURGE RESTORES DOOR OPERATIONS.\nSECOND ORDER EFFECT: ATLAS AI SAFETY GOVERNORS DISABLED. REACTOR TEMPERATURE VELOCITY INCREASING EXPONENTIALLY. MELTDOWN IMMINENT.\n\nYOU HAVE MINUTES BEFORE THE FACILITY VAPORIZES. ESCAPE PODS ARE ONLINE BUT LACK AI NAV-GUIDANCE.\n\n[1] LAUNCH ESCAPE POD (BLIND TRAJECTORY)\n[2] RUN TO REACTOR CORE FOR MANUAL SCRAM",
            choices: {
                '1': 'BLIND_LAUNCH',
                '2': 'MANUAL_SCRAM'
            }
        },
        'FIX_RELAY': {
            effect: () => { metrics.crewAlive = false; metrics.o2 -= 20; },
            text: "FIRST ORDER EFFECT: RADIATION CONTAINED. PATH TO HANGAR SECURED.\nSECOND ORDER EFFECT: CREWMATE SUFFOCATES WHILE YOU WORK. YOU LOSE ACCESS TO THEIR ENGINEERING KEYCODES.\n\nYOU REACH THE HANGAR. A SHUTTLE IS INTACT, BUT ITS IGNITION REQUIRES ENGINEERING CLEARANCE OR AN AI OVERRIDE.\n\n[1] ATTEMPT BRUTE-FORCE HOTWIRE OF SHUTTLE\n[2] UPLINK ATLAS AI TO SHUTTLE MAINFRAME",
            choices: {
                '1': 'HOTWIRE',
                '2': 'AI_UPLINK'
            }
        },
        'RESCUE_CREW': {
            effect: () => { metrics.o2 -= 30; metrics.hangarIrradiated = true; },
            text: "FIRST ORDER EFFECT: CREWMATE RESCUED. ENGINEERING CODES ACQUIRED.\nSECOND ORDER EFFECT: RELAY MELTS DOWN. RADIATION FLOODS THE HANGAR BAY. PRIMARY SHUTTLES ARE INACCESSIBLE.\n\nYOUR ONLY OPTION IS THE SECONDARY ESCAPE PODS. COMMS ARE DOWN, SO RESCUE IS IMPOSSIBLE.\n\n[1] PROCEED TO SECONDARY PODS WITH CREWMATE\n[2] SACRIFICE SUIT INTEGRITY TO REACH HANGAR ANYWAY",
            choices: {
                '1': 'SECONDARY_PODS',
                '2': 'RAD_DASH'
            }
        },
        // --- TERMINAL ENDINGS ---
        'MANUAL_AIRLOCK': {
            text: "END OF LINE.\nWITHOUT BIOMETRICS OR AI ASSISTANCE, THE AIRLOCK CYCLING SEQUENCE FAILS. YOU ARE FLUSHED INTO THE VACUUM ALONG WITH THE REMAINING DEBRIS.\n\nCRITICAL FAILURE IDENTIFIED: INCENTIVIZED SHORT-TERM SURVIVAL OVER STRUCTURAL ASSET PRESERVATION (CREW).",
            terminal: true
        },
        'REWIRE_COMMS': {
            text: "END OF LINE.\nTHE COMMS ARRAY WAS SEVERED DURING THE INITIAL IMPACT. YOU SPEND YOUR REMAINING OXYGEN ATTEMPTING TO RE-ROUTE A DEAD CIRCUIT.\n\nCRITICAL FAILURE IDENTIFIED: LACK OF SITUATIONAL AWARENESS REGARDING HARDWARE VELOCITY.",
            terminal: true
        },
        'BLIND_LAUNCH': {
            text: "END OF LINE.\nYOU LAUNCH THE POD. WITHOUT ATLAS NAV-GUIDANCE, THE THRUSTERS MISCALCULATE LUNAR GRAVITY. THE POD SKIPS OFF THE EXOSPHERE AND DRIFTS INTO DEEP SPACE.\n\nCRITICAL FAILURE IDENTIFIED: SACRIFICING LONG-TERM NAVIGATIONAL LOGIC FOR IMMEDIATE POWER GAINS.",
            terminal: true
        },
        'MANUAL_SCRAM': {
            text: "END OF LINE.\nYOU REACH THE REACTOR. THE TEMPERATURE VELOCITY IS TOO HIGH. THE CORE DETONATES AS YOU GRAB THE CONTROL ROD LEVERS.\n\nCRITICAL FAILURE IDENTIFIED: UNDERESTIMATING EXPONENTIAL DEGRADATION CURVES.",
            terminal: true
        },
        'HOTWIRE': {
            text: "END OF LINE.\nBRUTE-FORCING THE SHUTTLE IGNITION TRIGGERS ITS ANTI-THEFT PROTOCOLS. THE SHUTTLE LOCKS DOWN PERMANENTLY. YOU SUFFOCATE IN THE COCKPIT.\n\nCRITICAL FAILURE IDENTIFIED: DISREGARD FOR PROPRIETARY HARDWARE INCENTIVES.",
            terminal: true
        },
        'AI_UPLINK': {
            text: "SURVIVAL SECURED.\nATLAS AI UPLOADS TO THE SHUTTLE, OVERRIDING THE ENGINEERING LOCKS. YOU LAUNCH SUCCESSFULLY.\n\nNOTE: YOU ARE THE SOLE SURVIVOR. THE FACILITY IS LOST. A PYRRHIC VICTORY, BUT LOGICALLY SOUND GIVEN THE INITIAL METRICS.",
            terminal: true
        },
        'SECONDARY_PODS': {
            text: "SURVIVAL SECURED.\nYOU AND THE CREWMATE REACH THE PODS. THEIR ENGINEERING KEYCODES BYPASS THE LOCKDOWN. YOU BOTH EJECT BEFORE THE RADIATION SPREADS.\n\nNOTE: OPTIMAL UTILIZATION OF HUMAN ASSETS TO BYPASS HARDWARE RESTRICTIONS.",
            terminal: true
        },
        'RAD_DASH': {
            text: "END OF LINE.\nTHE RADIATION INSTANTLY DEGRADES YOUR SUIT SEALS. YOU COLLAPSE BEFORE REACHING THE SHUTTLE RAMP.\n\nCRITICAL FAILURE IDENTIFIED: IGNORING LETHAL ENVIRONMENTAL VARIABLES.",
            terminal: true
        }
    };

    function updateHUD() {
        hudO2.innerText = `O2: ${metrics.o2}%`;
        hudPwr.innerText = `PWR: ${metrics.pwr}%`;
        hudHull.innerText = `HULL: ${metrics.hull}`;
        
        let crewStatus = metrics.crewAlive ? "STASIS/ACTIVE" : "EXPENDED";
        if (!metrics.crewAlive) hudCrew.classList.add('stat-critical');
        hudCrew.innerText = `CREW: ${crewStatus}`;

        if (metrics.o2 <= 40) hudO2.classList.add('stat-critical');
        else hudO2.classList.remove('stat-critical');
        
        if (metrics.pwr <= 30) hudPwr.classList.add('stat-critical');
        else hudPwr.classList.remove('stat-critical');

        if (metrics.hull === 'CRITICAL') {
            hudHull.classList.add('stat-critical');
            screen.classList.add('alert-active');
        } else {
            hudHull.classList.remove('stat-critical');
            screen.classList.remove('alert-active');
        }
    }

    function renderNode(nodeId) {
        currentNodeId = nodeId;
        const node = storyNodes[nodeId];
        
        if (node.effect) node.effect();
        updateHUD();
        saveGame();

        printText(node.text, 30, () => {
            if (node.terminal) {
                setTimeout(() => {
                    inputField.style.display = 'none';
                    promptSpan.innerText = "SYSTEM HALTED.";
                    deleteSave();
                    if(staticGainNode) staticGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3);
                }, 1000);
            }
        });
    }

    // --- SYSTEM & AUDIO ---
    function saveGame() {
        const data = { currentNodeId, metrics };
        localStorage.setItem('archimedes_save', JSON.stringify(data));
    }

    function loadGame() {
        const data = JSON.parse(localStorage.getItem('archimedes_save'));
        currentNodeId = data.currentNodeId;
        metrics = data.metrics;
    }

    function deleteSave() {
        localStorage.removeItem('archimedes_save');
    }

    function playHardwareSwitch() {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(80, t);
        osc.frequency.exponentialRampToValueAtTime(10, t + 0.15);
        gain.gain.setValueAtTime(0.8, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + 0.15);
    }

    function createKeyNoiseBuffer() {
        const bufferSize = audioCtx.sampleRate * 0.05; 
        keyNoiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = keyNoiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1; 
    }

    function startStaticNoise() {
        const bufferSize = audioCtx.sampleRate * 2; 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass'; 
        filter.frequency.value = 1200; 

        staticGainNode = audioCtx.createGain();
        staticGainNode.gain.value = 0.003; 

        noise.connect(filter);
        filter.connect(staticGainNode);
        staticGainNode.connect(audioCtx.destination);
        noise.start();
    }

    function playKeyDown() {
        if (!audioCtx || !keyNoiseBuffer) return;
        const t = audioCtx.currentTime;
        const source = audioCtx.createBufferSource();
        source.buffer = keyNoiseBuffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 3000;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.015);
        
        source.connect(filter).connect(gain).connect(audioCtx.destination);
        source.start(t);
        source.stop(t + 0.02);
    }

    function printText(text, speed = 30, callback = null) {
        isTyping = true;
        inputField.disabled = true;
        let i = 0;
        
        const interval = setInterval(() => {
            outputDiv.innerHTML += text.charAt(i);
            if (text.charAt(i) !== ' ' && text.charAt(i) !== '\n') playKeyDown();
            
            outputDiv.scrollTop = outputDiv.scrollHeight;
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                outputDiv.innerHTML += '<br><br>';
                isTyping = false;
                inputField.disabled = false;
                inputField.focus();
                if (callback) callback();
            }
        }, speed);
    }

    function handleInput(rawCmd) {
        if (isTyping) return;
        
        const sanitizedRaw = rawCmd.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const cmd = sanitizedRaw.trim();
        
        outputDiv.innerHTML += `<span style="color:#e0e0e0">> ${cmd}</span><br>`;
        inputField.value = '';

        if (state === 'RESTORE_PROMPT') {
            if (cmd === '1') {
                loadGame();
                state = 'ACTIVE';
                hudBar.style.display = 'flex';
                renderNode(currentNodeId);
            } else if (cmd === '2') {
                deleteSave();
                state = 'ACTIVE';
                hudBar.style.display = 'flex';
                renderNode('INIT');
            } else {
                printText("INVALID SELECTION. ENTER 1 OR 2.");
            }
            return;
        }

        if (state === 'ACTIVE') {
            const node = storyNodes[currentNodeId];
            if (!node.choices) return; // Terminal state

            if (node.choices[cmd]) {
                const nextNode = node.choices[cmd];
                renderNode(nextNode);
            } else {
                printText("INVALID INPUT. SELECT A NUMERIC IDENTIFIER FROM THE AVAILABLE TACTICAL OPTIONS.");
            }
        }
    }

    powerButton.addEventListener('click', () => {
        if (state !== 'OFF') return; 
        
        powerButton.classList.add('active');
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        startStaticNoise();
        createKeyNoiseBuffer();
        playHardwareSwitch();

        screen.classList.add('powered-on');

        setTimeout(() => {
            inputLine.style.display = 'flex';
            
            if (localStorage.getItem('archimedes_save')) {
                state = 'RESTORE_PROMPT';
                printText("ATLAS PROTOCOL ONLINE. LOCAL CACHE DETECTED.\n[1] RESUME PREVIOUS OPERATION\n[2] WIPE CACHE AND RESTART\nINPUT TACTICAL CHOICE:");
            } else {
                state = 'ACTIVE';
                hudBar.style.display = 'flex';
                updateHUD();
                renderNode('INIT');
            }
        }, 1500);
    });

    inputField.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            let val = inputField.value.trim();
            if (val !== '') handleInput(val);
        } else if (e.key !== 'Shift') {
            playKeyDown();
        }
    });

</script>
</body>
</html>
