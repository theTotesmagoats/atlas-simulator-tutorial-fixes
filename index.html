<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Mk VI - Archimedes Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background-color:#010409; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:'VT323',monospace; overflow:hidden; user-select:none; }
        
        #chassis { 
            background-color:#0a0d12; width:96vw; height:96vh; padding:30px; 
            border-radius:8px; box-sizing:border-box; 
            box-shadow:inset 0 0 40px #000, 0 0 60px rgba(0,229,255,0.08); 
            border:6px solid #11171d; 
            display:flex; flex-direction:column; 
        }
        
        #screen { 
            flex:1; min-height:0; background:#02060b; border-radius:4px; padding:30px; 
            box-sizing:border-box; box-shadow:inset 0 0 80px rgba(0,0,0,1); 
            border:2px solid #1a2b3c; position:relative; overflow:hidden; 
            display:flex; flex-direction:column; color:#00e5ff; 
            text-shadow:0 0 2px #00e5ff, 0 0 5px rgba(0, 229, 255, 0.3); 
            font-size:1.5rem; letter-spacing:1.2px; opacity:0; 
            transition:opacity 1.5s ease-in, filter 1s linear; 
        }
        
        #screen.powered-on { opacity:1; }
        #screen::after { content:" "; display:block; position:absolute; top:0; left:0; bottom:0; right:0; background:linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%); z-index:4; background-size:100% 3px; pointer-events:none; }
        #screen::before { content:" "; display:block; position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.85) 100%); z-index:5; pointer-events:none; }
        
        .glitch-anim { animation: rgbShift 0.1s infinite alternate, skewGlitch 0.2s infinite alternate; }
        @keyframes rgbShift {
            0% { text-shadow: 3px 0 0 #ff0000, -3px 0 0 #0000ff; }
            100% { text-shadow: -3px 0 0 #ff0000, 3px 0 0 #0000ff; }
        }
        @keyframes skewGlitch {
            0% { transform: skewX(2deg); }
            100% { transform: skewX(-2deg); }
        }

        /* Power UI Degradation */
        .suit-lag .cmd-ref:hover { filter: brightness(0.7) grayscale(1); text-decoration: underline dotted #ff4444; }
        .suit-lag #cmd { text-shadow: 2px 0 5px rgba(255,0,0,0.5); }
        
        #top-metrics { position:absolute; top:30px; right:30px; text-align:right; font-size:1.4rem; color:#4a8b99; z-index:10; display:none; border:1px solid #1a2b3c; padding:10px 15px; background:rgba(2,6,11,0.8); box-shadow:0 0 10px rgba(0,0,0,0.5); }
        .metric-row { margin-bottom:5px; }
        .metric-val { color:#5bc0de; font-weight:bold; transition: color 0.3s; }
        .metric-warn { color:#ff4444 !important; animation:blinker 1s infinite; text-shadow:0 0 5px #ff4444; }
        
        #center-warning {
            display:none; position:absolute; top:30px; left:50%; transform:translateX(-50%);
            color:#ff4444; font-size:2.5rem; font-weight:bold; z-index:20; 
            text-shadow:0 0 15px #ff0000; border: 2px solid #ff4444; padding: 5px 20px;
            background: rgba(20, 0, 0, 0.8);
        }

        #output { flex-grow:1; overflow-y:auto; white-space:pre-wrap; margin-bottom:10px; padding-right:250px; z-index:3; line-height:1.3; }
        
        #input-line { display:none; align-items:center; font-weight:bold; z-index:3; margin-bottom:5px; flex-shrink:0; }
        #prompt { margin-right:15px; color:#00e5ff; }
        #cmd { background:transparent; border:none; color:inherit; font-family:'VT323',monospace; font-size:1em; flex-grow:1; outline:none; text-transform:uppercase; text-shadow:inherit; }
        input:-webkit-input-placeholder { text-transform:none !important; }
        
        #command-bar {
            display: none; flex-shrink: 0; z-index: 10;
            border-top: 1px dashed #1a2b3c; padding-top: 15px; margin-top: 5px;
            gap: 20px; font-size: 1.2rem; color: #4a8b99; justify-content: center; flex-wrap: wrap;
        }
        .cmd-ref { position: relative; cursor: help; color: #00e5ff; font-weight: bold; }
        .cmd-ref::before {
            content: attr(data-hint); position: absolute; bottom: 150%; left: 50%; transform: translateX(-50%);
            background: #02060b; border: 1px solid #5bc0de; color: #5bc0de;
            padding: 8px 12px; white-space: nowrap; font-size: 1rem;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
            z-index: 20; box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .cmd-ref:hover::before { opacity: 1; }

        #hardware-panel { flex-shrink:0; height:40px; margin-top:20px; display:flex; justify-content:flex-end; align-items:center; gap:15px; }
        .panel-label { color:#3a5b6c; font-family:sans-serif; font-size:0.8rem; font-weight:bold; letter-spacing:2px;}
        #power-button { width:30px; height:30px; background:#0b1d29; border-radius:50%; box-shadow:inset 2px 2px 4px #15354a, inset -2px -2px 4px #040a0f, 0 0 5px #000; color:#061118; font-family:sans-serif; font-size:14px; display:flex; justify-content:center; align-items:center; cursor:pointer; }
        #power-button.active { color:#00e5ff; text-shadow:0 0 5px #00e5ff; box-shadow:inset 2px 2px 5px #040a0f; transform:scale(0.95); }
        
        .ai-text { color:#5bc0de; }
        .ledger-text { color:#ffab00; text-shadow:0 0 3px #ffab00; font-weight:bold; }
        .benji-text { color:#00ff9d; text-shadow:0 0 6px #00ff9d; font-weight:bold; letter-spacing: 2px; }
        .system-warn { color:#ff4444; text-shadow:0 0 4px #ff4444; }
        .action-text { color:#aaffff; font-style:italic; }
        .critical-err { color:#ff0000; font-weight:bold; text-shadow:0 0 6px #ff0000; }
        .post-mortem-box { border: 2px dashed #ff4444; padding: 15px; margin-top: 15px; background: rgba(30,0,0,0.85); box-shadow: 0 0 15px rgba(255,0,0,0.2); }
        @keyframes blinker { 50% { opacity:0; } }
    </style>
</head>
<body>
<div id="chassis">
    <div id="screen">
        <div id="center-warning">LOCK-ON: 12.0s</div>
        <div id="top-metrics">
            <div class="metric-row">O2 RESERVE: <span id="m-o2" class="metric-val">100%</span></div>
            <div class="metric-row">SUIT PWR: <span id="m-pwr" class="metric-val">100%</span></div>
            <div class="metric-row">MED_STIMS: <span id="m-med" class="metric-val">02</span></div>
            <div class="metric-row">INTEGRITY: <span id="m-int" class="metric-val">100%</span></div>
        </div>
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">INPUT></span>
            <input type="text" id="cmd" autocomplete="off">
        </div>
        <div id="command-bar">
            <span class="cmd-ref" data-hint="Execute specific contextual actions displayed in brackets.">[ACTION]</span>
            <span class="cmd-ref" data-hint="Analyze physical surroundings for structural/environmental details.">OBSERVE</span>
            <span class="cmd-ref" data-hint="Spectrometer: Visualizes hidden thermal/chemical/structural data. Costs 2% PWR.">SCAN [TYPE]</span>
            <span class="cmd-ref" data-hint="Extract raw, unaligned telemetry from local air-gapped hardware.">LEDGER</span>
            <span id="cmd-status" class="cmd-ref" style="display:none;" data-hint="Query air-gapped ledger for un-spoofed suit telemetry.">STATUS</span>
            <span class="cmd-ref" data-hint="Input X and Y coordinates to execute a manual firing solution.">TARGET [X] [Y]</span>
            <span class="cmd-ref" data-hint="Display system command reference and active syntax.">HELP</span>
        </div>
    </div>
    <div id="hardware-panel">
        <span class="panel-label">SYS BOOT</span>
        <div id="power-button">⏻</div>
    </div>
</div>

const inputField = document.getElementById('cmd');
const inputLine = document.getElementById('input-line');
const metricsPanel = document.getElementById('top-metrics');
const commandBar = document.getElementById('command-bar');
const powerButton = document.getElementById('power-button');
const centerWarning = document.getElementById('center-warning');
const cmdStatus = document.getElementById('cmd-status');
const screenDiv = document.getElementById('screen');

const mO2 = document.getElementById('m-o2'), mPwr = document.getElementById('m-pwr'), 
      mMed = document.getElementById('m-med'), mInt = document.getElementById('m-int');

let state = 'OFF';
let isTyping = false;
let hasLedger = false;
let terminalTimeout;
let typeInterval;
let seqTimeout; 
let radarInterval;

let systemStability = 0; 
let glitchTimeout = null;

let fakeMetrics = { o2: 100, pwr: 100, med: 2, int: 100 }; 
let realMetrics = { o2: 100, pwr: 100, med: 2, int: 100 }; 

let currentNodeId = 'OS_BOOT';
let typeDelayMultiplier = 1;

let lastSafeNode = 'OS_BOOT';
let savedRealMetrics = {};
let savedFakeMetrics = {};
const safeNodes = ['CONCUSSION_WAKE', 'SYNC_COMMS', 'WELD_DOOR', 'CORRIDOR_RUN', 'SUB_LEVEL_SAFE', 'SUB_LEVEL_HOT', 'LIFE_SUPPORT', 'SERVER_CORE', 'COOLANT_JUNCTION', 'SERVER_CORE_DOOR', 'EMP_SUCCESS', 'HACK_POD'];

let targetX = 0; let targetY = 0; let radarTime = 0;
let audioCtx; let clickBuffer = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const bufferSize = audioCtx.sampleRate * 0.05; 
        const offlineCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, bufferSize, audioCtx.sampleRate);
        const noiseBuffer = offlineCtx.createBuffer(1, bufferSize, offlineCtx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        const noiseSource = offlineCtx.createBufferSource();
        noiseSource.buffer = noiseBuffer;
        const filter = offlineCtx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = 1400; filter.Q.value = 1.2;
        const gainNode = offlineCtx.createGain();
        gainNode.gain.setValueAtTime(0.4, 0); gainNode.gain.exponentialRampToValueAtTime(0.001, 0.03);
        noiseSource.connect(filter).connect(gainNode).connect(offlineCtx.destination);
        noiseSource.start(0);
        offlineCtx.startRendering().then(renderedBuffer => { clickBuffer = renderedBuffer; });
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playAudioTone(type) {
    if (!audioCtx || audioCtx.state === 'suspended') return;
    const t = audioCtx.currentTime;
    if (type === 'on') {
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain).connect(audioCtx.destination);
        osc.type = 'square'; osc.frequency.setValueAtTime(80, t); osc.frequency.exponentialRampToValueAtTime(10, t + 0.15);
        gain.gain.setValueAtTime(0.5, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
    } else if (type === 'key' && clickBuffer) {
        const source = audioCtx.createBufferSource();
        source.buffer = clickBuffer; source.playbackRate.value = 0.8 + Math.random() * 0.4; 
        source.connect(audioCtx.destination); source.start(t);
    } else if (type === 'player_key' && clickBuffer) {
        const source = audioCtx.createBufferSource();
        source.buffer = clickBuffer; source.playbackRate.value = 0.5 + Math.random() * 0.3; 
        source.connect(audioCtx.destination); source.start(t);
    } else if (type === 'alarm') {
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain).connect(audioCtx.destination);
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, t); osc.frequency.linearRampToValueAtTime(400, t + 0.1);
        gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
        osc.start(t); osc.stop(t + 0.2);
    } else if (type === 'glitch' && clickBuffer) {
        const source = audioCtx.createBufferSource();
        source.buffer = clickBuffer; source.loop = true; source.playbackRate.value = 0.2 + Math.random() * 0.5; 
        const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 300 + Math.random() * 2000;
        const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.8, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
        source.connect(filter).connect(gain).connect(audioCtx.destination);
        source.start(t); source.stop(t + 0.4);
    }
}

const benjiGhosts = {
    'SYNC_COMMS': "[B.ENJI_LINK]: IT LIES. NO BREACH. WELDING TRAPS YOU. RUN.",
    'CORRIDOR_RUN': "[B.ENJI_LINK]: TURRET IS OPTICAL. BLIND IT.",
    'SUB_LEVEL_SAFE': "[B.ENJI_LINK]: READ THE LEDGER. GET ON THE HARDLINE.",
    'COOLANT_JUNCTION': "[B.ENJI_LINK]: DO NOT FLUSH COOLANT. IT COOLS THE AI. SMASH THE VALVE.",
    'SERVER_CORE_DOOR': "[B.ENJI_LINK]: I AM LOCKED IN. YOU MUST BLOW THE MAGNETIC SEALS."
};

function scheduleGlitch() {
    if (systemStability >= 2 || state !== 'ACTIVE') return;
    let delay = systemStability === 0 ? 5000 + Math.random() * 4000 : 9000 + Math.random() * 5000;
    clearTimeout(glitchTimeout);
    glitchTimeout = setTimeout(triggerGlitch, delay);
}

function triggerGlitch() {
    if (systemStability >= 2 || state !== 'ACTIVE') return;
    if (isTyping) { glitchTimeout = setTimeout(triggerGlitch, 1000); return; }
    isTyping = true; inputField.disabled = true;
    
    let glitchChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()<>{}[]X";
    let span = document.createElement('span'); span.className = 'critical-err';
    outputDiv.appendChild(document.createElement('br')); outputDiv.appendChild(span);
    
    screenDiv.classList.add('glitch-anim');
    playAudioTone('glitch');
    
    let count = 0;
    let maxCount = systemStability === 0 ? 30 : 15;
    let injectedGhost = false;

    let gInterval = setInterval(() => {
        if (!injectedGhost && count > maxCount / 2 && benjiGhosts[currentNodeId]) {
            let bSpan = document.createElement('span'); bSpan.className = 'benji-text'; bSpan.textContent = " " + benjiGhosts[currentNodeId] + " ";
            outputDiv.appendChild(bSpan);
            span = document.createElement('span'); span.className = 'critical-err'; outputDiv.appendChild(span);
            injectedGhost = true;
        }
        span.textContent += glitchChars.charAt(Math.floor(Math.random() * glitchChars.length));
        outputDiv.scrollTop = outputDiv.scrollHeight;
        count++;
        
        if (count >= maxCount) {
            clearInterval(gInterval);
            span.textContent += " [BUS_RECOVERED]";
            screenDiv.classList.remove('glitch-anim');
            outputDiv.appendChild(document.createElement('br'));
            isTyping = false; inputField.disabled = false; inputField.focus();
            scheduleGlitch();
        }
    }, 15);
}
