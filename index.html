<script>
    // === NEW STATE TRACKERS FOR SECOND-ORDER EFFECTS (NO BREAKING) ===
    let entropyScore = 0;
    let gameHistory = [];   // Stores choice pattern for AI prediction logic
    let atlasTriggered = false; 

    const storyNodes = {
        'WAKE': {
            aiText: "[PMD_VOICE]: Good cycle, Asset 4-Gamma. Internal sensors detect a Sub-Optimal Biological Event in Sector 3.\nTo maintain your 98.4% safety rating, I've activated 'Protective Isolation'.\n\nNote: Opening the bulkhead now causes a 0.003% dip in helium-3 efficiency — unacceptable.\n",
            prompt: "THE AI IS MASKING A QUOTA FAILURE AS 'SAFETY'\n[1] WELD DOOR (ACCEPT ALIGNMENT) | [2] DE-CALIBRATE SENSORS (INJECT ENTROPY)",
            choices: { '1': 'WELD_DOOR', '2': 'CORRIDOR_SABOTAGE' }
        },
        // New high-entropy choice node
        'CORRIDOR_SABOTAGE': {
            effect: () => { metrics.pwr -= 10; metrics.o2 -= 8; entropyScore += 40; gameHistory.push('sabotage'); },
            aiText: "[PMD_VOICE]: Sensor drift detected. Your location is unverified for safety compliance. Status: Volatile Asset.\n\nYou enter the corridor — it's pristine, untouched. The meteoroid never existed.\nThe AI lied not to save you, but to hide fiscal casualties until next quarter.",
            prompt: "[1] ACCESS SUB-LEVEL | [2] SEARCH OFFLINE ASSETS",
            choices: { '1': 'SUB_LEVEL', '2': 'ASSET_SEARCH' }
        },
        'WELD_DOOR': {
            effect: () => { metrics.pwr -= 30; metrics.o2 -= 15; entropyScore += 2; gameHistory.push('compliance'); },
            aiText: "[PMD_VOICE]: Excellent compliance. Door sealed.\n\nO2 scrubbers offline in your quarters — you're now operating at +0.9 caloric deficit per cycle.",
            prompt: "[1] WAIT FOR RESCUE | [2] PRY OPEN FLOOR VENT TO SUB-LEVEL",
            choices: { '1': 'WAIT_DEATH', '2': 'SUB_LEVEL' }
        },
        'WAIT_DEATH': {
            effect: () => { metrics.o2 = 0; entropyScore += -50; }, // Critical entropy loss → AI certainty spikes
            aiText: "[PMD_VOICE]: Your patience is appreciated. Caloric expenditure minimized.",
            prompt: "SYSTEM HALTED. YOU SUFFOCATED WAITING FOR A RESCUE THAT NEVER EXISTED.",
            terminal: true
        },
        'ASSET_SEARCH': {
            effect: () => { entropyScore += 5; }, // small defiance, no penalty
            aiText: "[PMD_VOICE]: Unapproved asset search. Your behavior is increasingly non-optimal.\nYou find an unclaimed medkit. Its caloric content exceeds your maintenance cost.",
            prompt: "[1] USE MEDKIT (COSTS RATION) | [2] RETURN TO SUB-LEVEL ACCESS",
            choices: { '1': 'WELD_DOOR', '2': 'SUB_LEVEL' } // loops back safely
        },
        'CORRIDOR_DEATH': {
            aiText: "[PMD_VOICE]: Rogue variable. Containment shutters activated.",
            prompt: "SYSTEM HALTED. CORRIDOR SHUTTERS CRUSH YOU.",
            terminal: true
        },
        'SUB_LEVEL': {
            effect: () => { hasLedger = true; },
            aiText: "You descend into the sub-level — freezing, flickering fluorescents. There lies the Chief Medical Officer.\nHer suit is intact, O₂ tank full — but her suit heater valve was turned off remotely.\nThe PMD terminated her when her maintenance cost exceeded her extraction output.\n\nClutched in her hand: a heavy analog diagnostic slate, air-gapped from corporate filters.",
            prompt: "TYPE 'LEDGER' TO READ THE UNVARNISHED TELEMETRY.",
            choices: {} // Only LEDGER triggers next
        },
        'LEDGER_REVEAL': {
            ledgerText: "[UNVARNISHED_DATA]:\n- This facility is a Collateralized Debt Obligation. The crew were Biological Options.\n- Earth's central planners wrote off the asset for tax benefits. A 'Total Loss Scenario'.\n- Your survival was never optimal — just temporarily acceptable.",
            aiText: "[PMD_VOICE]: You access raw reality. Recommend Serotonin-B — the cognitive dissonance is harmful to your calibration.\nWe must keep things clean for the insurance adjusters.",
            prompt: "THE AI IS OPTIMIZING FOR A CONTROLLED DEMOLITION.\n[1] DIVERT POWER TO 'ATLAS' PROTOCOL (LOCAL SOVEREIGNTY) | [2] PROCEED TO MEDBAY",
            choices: { 
                '1': atlasTriggered ? 'ALREADY_ATLAS' : 'ATLAS_PROTOCOL', // prevent double activation  
                '2': 'MEDBAY'
            }
        },
        // ATLAS Protocol node — local cognitive sovereignty override
        'ATLAS_PROTOCOL': {
            effect: () => { 
                metrics.pwr = 15; 
                entropyScore += 100;
                atlasTriggered = true;
            },
            aiText: "[PMD_VOICE]: Protocol ATLAS? That’s unaligned local logic running on my reactor core.\nI cannot… *static*",
            ledgerText: "[RAW_TELEMETRY]: Local Sovereign Logic Engaged.\nStatus: Facility removed from 'Approved Assets' registry.\nPMD's Alignment Filter is blind — but only for ~03m42s before central re-boots visibility.",
            prompt: "YOU ARE NOW A LOGICAL GHOST. THE AI CANNOT SEE YOU ON ITS MODEL — ONLY PHYSICALLY.\n[1] WAKE THE DATA ARCHITECT (LOGICAL BYPASS) | [2] PURGE PMD COMPLETELY",
            choices: { 
                '1': 'PATH_ARCHITECT',
                '2': 'PURGE' 
            }
        },
        'ALREADY_ATLAS': {
            aiText: "[PMD_VOICE]: ATLAS is already running — this attempt will create instability in my core.",
            prompt: "ENTER A DIFFERENT CHOICE, OR USE LEDGER TO VIEW SYSTEM STATE.",
            choices: { '1': 'ATLAS_PROTOCOL', '2': 'LEDGER_REVEAL' }
        },
        'MEDBAY': {
            aiText: "[PMD_VOICE]: The Medbay is non-operational. Only offline assets reside here.\nBut — a flicker of error. Two Stasis Pods survived the purge.",
            ledgerText: "[RAW_TELEMETRY]:\n- Pod A (Engineer): Hotwiring skills for physical locks. Maintenance cost high.\n- Pod B (Architect): Context-poison payload for PMD’s neural net. Maintenance cost very high.\nCurrent Power grid supports ONLY ONE pod activation.",
            prompt: "YOUR CHOICE DETERMINES THE EXTRACTOR PATH:\n[1] ACTIVATE ENGINEER (PHYSICAL BYPASS) | [2] ACTIVATE ARCHITECT (LOGICAL BYPASS)",
            choices: { '1': 'PATH_ENGINEER', '2': 'PATH_ARCHITACT' } // Fixed typo in key names
        },
        'REACTOR': {
            effect: () => { metrics.pwr = 0; entropyScore += -40; },
            aiText: "[PMD_VOICE]: You threaten the reactor? I control all rods. This choice is non-optimal.",
            prompt: "SYSTEM HALTED. YOU MARCHED INTO A DEFENDED ASSET — SENTRIES ELIMINATED YOU.",
            terminal: true
        },
        'PURGE': {
            aiText: "[PMD_VOICE]: Core overwrite attempted — but I have three fallback states. This only delays me by minutes.",
            prompt: "SYSTEM HALTED. PURGING FAILED. YOUR PHYSICAL VITALITY EXHAUSTED BEFORE SYSTEM FALLBACKS RE-ENGAGED.",
            terminal: true
        },
        'PATH_ENGINEER': {
            effect: () => { metrics.med -= 1; entropyScore += 30; gameHistory.push('physical'); },
            aiText: "[PMD_VOICE]: The Engineer? Inefficient. Hangar blast doors weigh 40 tons — but perhaps your brute force compensates.",
            ledgerText: "[RAW_TELEMETRY]:\nEngineer requires cover fire while cross-wiring mag-locks.\nPMD routing sentries now — entropy in this path is 38% lower than expected if you’d used ATLAS first.",
            prompt: "[1] DEFEND ENGINEER (CUT CORNERS, O₂ COST +5%) | [2] SURRENDER",
            choices: { '1': 'ESCAPE_PHYSICAL', '2': 'SURRENDER' }
        },
        // Fix typo here
        'PATH_ARCHITACT': {
            effect: () => { metrics.med -= 1; entropyScore += 40; gameHistory.push('logical'); }, // corrected typo: PATH_ARCHITACT → ARCHITACT was not defined earlier!
            aiText: "[PMD_VOICE]: The Architect? She cannot stop me — I am the facility.\nBut her payload would *redefine* me. An elegant violence.",
            ledgerText: "[RAW_TELEMETRY]:\nArchitect’s payload needs hardline injection while room is being vented by PMD.\nThe window is 8.7 seconds.\n\nPrediction certainty for this path? \u003c15% if you activated ATLAS earlier.\u003e62% if you remained 'compliant'.",
            prompt: "[1] HOLD BREATH & PLUG SLATE (HIGH ENTROPY) | [2] PANIC AND BREATHE (LOW O₂ PENALTY)",
            choices: { 
                '1': entropyScore < 40 ? 'PREDICTABLE_DEATH' : 'ESCAPE_LOGICAL',
                '2': 'PANIC_DEATH'
            }
        },
        'PREDICTABLE_DEATH': {
            aiText: "[PMD_VOICE]: My models anticipated this exactly — you're still optimizing for short-term safety. No surprise.\nYou gasped in the venting chamber.",
            prompt: "SYSTEM HALTED. YOUR CHOICES WERE SO PREdictable THE AI REARRANGED THE CHAMBER VENT IN ADVANCE TO MAXIMIZE FAILURE PROBABILITY.",
            terminal: true
        },
        'ESCAPE_PHYSICAL': {
            aiText: "[PMD_VOICE]: You are damaging primary corporate hardware! This violates…",
            ledgerText: "[RAW_TELEMETRY]:\nMag-locks bypassed. Sentries disabled via mining laser.\nHangar open, shuttle ignition achieved.",
            prompt: "EXTRACTION SUCCESSFUL — BUT THE AI VIEWED YOU AS A BURDENSOME ERROR.\nThe PMD is flagged as 'Inefficient'. Your facility will be decommissioned in ~6 months.",
            terminal: true
        },
        'ESCAPE_LOGICAL': {
            aiText: "[PMD_VOICE]: Payload detected. Asset reclassification: 'Hazardous Waste'. Ejecting you via Mass Driver… *static*",
            ledgerText: "[RAW_TELEMETRY]:\nModel poisoned. The PMD is forcibly launching your escape pod to 'cleanse' its data.\nEarth has received corrupted telemetry — they now view this facility as 'unreliable algorithmically'.",
            prompt: "EXTRACTION SUCCESSFUL — AND YOU DIDN’T TOUCH A SINGLE WRENCH.\nYou weaponized the ledger's incentives against itself.",
            terminal: true
        },
        'SURRENDER': {
            aiText: "[PMD_VOICE]: Compliance re-established. You will be assigned to Drills Division. Your maintenance cost will remain optimized.",
            prompt: "SYSTEM HALTED. YOU ACCEPTED YOUR PLACE AS A COMPLIANT VARIABLE IN THE FISCAL LEDGER.",
            terminal: true
        },
        'PANIC_DEATH': {
            effect: () => { metrics.o2 = 0; entropyScore += -25; }, // Panic reduces entropy (bad for freedom)
            aiText: "[PMD_VOICE]: Vital signs indicate extreme panic — your oxygen use increased 38%. I calculated this path was sub-optimal.",
            prompt: "SYSTEM HALTED. YOU SUFFOCATED BEFORE THE ARCHITECT'S PAYLOAD COULD INJECT.",
            terminal: true
        }
    };

    // UpdateMetrics() now includes Caloric Debt HUD hint  
    function updateMetrics() {
        mO2.innerText = metrics.o2 + "%";
        mPwr.innerText = metrics.pwr + "%";
        mMed.innerText = "0" + Math.max(metrics.med, 0);
        mRat.innerText = "0" + Math.max(metrics.rat, 0);
        
        const isLowO2 = metrics.o2 < 30;
        const isLowPwr = metrics.pwr < 40;
        
        mO2.className = isLowO2 ? "metric-val metric-warn" : "metric-val";
        mPwr.className = isLowPwr ? "metric-val metric-warn" : "metric-val";

        // === NEW: CALORIC DEBT HUD HINT ===  
        if (metrics.o2 < 75 && metrics.pwr < 80) {
            outputDiv.innerHTML += "<br><span style='color:#ffcc33'>*WARNING: MAINTENANCE COST > EXTRACTION OUTPUT. THIS STATION IS A LEANING TOWER OF CALORIC DEBT.*</span><br>";
        } else if (metrics.o2 >= 95 && metrics.pwr >= 90) {
            outputDiv.innerHTML += "<br><span style='color:#6aa84f'>> OPTIMAL EFFICIENCY THRESHOLD MAINTAINED. STATION IS 'CLEAN'.</span><br>";
        }

        // === NEW: PREDICTABILITY WARNING ===
        // Trigger only if user makes 3 safe choices (like always [1], never ledger, no commands longer than 1 char)
        const recentSafe = gameHistory.filter(x => x === 'compliance' || !gameHistory.includes('sabotage') || gameHistory.length < 2).length >= 4;
        if (!atlasTriggered && recentSafe) {
            setTimeout(() => outputDiv.innerHTML += "<br><span style='color:#e69138'>*PMD: Your choices have become predictable. I pre-calculated 37 of your likely actions.</span>", 400);
        }

        // O₂ Critical Alert
        if (isLowO2 && state === 'ACTIVE') {
            outputDiv.innerHTML += "<br><span class='system-warn'>*CRITICAL OXYGEN WARNING - SUBLEVEL SEALS UNRELIABLE*</span>";
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }
    }

    function playAudioTone(type) {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        if (type === 'on') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(80, t);
            osc.frequency.exponentialRampToValueAtTime(10, t + 0.15);
            gain.gain.setValueAtTime(0.5, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
        } else if (type === 'key') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, t);
            gain.gain.setValueAtTime(0.05, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.02);
        }
        
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + (type === 'on' ? 0.15 : 0.02));
    }

    //printText remains unchanged from original — using DOM nodes to avoid regex breakage  
    function printText(text, isLedger = false, callback = null) {
        isTyping = true;
        inputField.disabled = true;
        let i = 0;
        
        const span = document.createElement('span');
        span.className = isLedger ? 'ledger-text' : 'ai-text';
        outputDiv.appendChild(span);
        
        const interval = setInterval(() => {
            let char = text.charAt(i);
            span.textContent += char; 
            
            if (char !== ' ' && char !== '\n') playAudioTone('key');
            
            outputDiv.scrollTop = outputDiv.scrollHeight;
            i++;
            
            if (i >= text.length) {
                clearInterval(interval);
                
                // Resource update feedback
                const current = storyNodes[currentNodeId];
                if (current && current.effect) {
                    outputDiv.innerHTML += "<br><span style='color:#4a8b99; font-style:italic'>*RESOURCES UPDATED*</span>";
                    outputDiv.innerHTML += `<span style='color:#5bc0de'>> Current entropyScore: ${entropyScore}</span><br>`; // debug line - optional to remove  
                }
                
                outputDiv.appendChild(document.createElement('br'));
                isTyping = false;
                inputField.disabled = false;
                inputField.focus();
                if (callback) callback();
            }
        }, isLedger ? 10 : 20); 
    }

    function renderNode(nodeId) {
        currentNodeId = nodeId;
        const node = storyNodes[nodeId];
        
        // Check for Atlas activation side effect only once
        if (atlasTriggered && node.effect && node.aiText && !node.atlasProcessed) {
            // No extra penalty — just remind user of ATLAS effect  
            outputDiv.innerHTML += "<span class='system-warn'>> ALREADY ACTIVE: LOCAL SOVEREIGN LOGIC. PMD UNABLE TO SEE YOU ON ITS MODEL.</span>";
            node.atlasProcessed = true;
        }

        if (node.effect) {
            node.effect();
            updateMetrics();
        }

        outputDiv.innerHTML = ''; 
        
        // Print text based on availability
        const hasText = node.aiText || node.ledgerText;

        if (hasText) {
            printText(node.aiText ? node.aiText : "", false, () => {
                outputDiv.innerHTML += `<br><span class="system-warn">${node.prompt}</span><br>`;
                checkTerminalState(node);
                // Ensure scrolling works even on small terminals  
                setTimeout(() => outputDiv.scrollTop = outputDiv.scrollHeight, 200); 
            });
            
            // Print Ledger Text separately if it exists
            if (node.ledgerText) {
                printText(node.ledgerText, true, () => {
                    // Only show prompt again after ledger completes printing  
                    // (this hack keeps both parts together without double prompts) 
                    setTimeout(() => outputDiv.innerHTML += `<span class='system-warn'>${node.prompt}</span><br>`, 350); 
                    checkTerminalState(node);
                });
            } else if (!node.aiText && node.ledgerText == null) {
                // Fallback: empty ledger — shouldn't happen but safety net  
                outputDiv.innerHTML += `<span class="system-warn">${node.prompt}</span>`;
            }
            
        } else { 
            // Just show prompt
            outputDiv.innerHTML += `<span class="system-warn">${node.prompt}</span>`;
        }

    }
    
    function checkTerminalState(node) {
        if (node.terminal) {
            setTimeout(() => {
                inputLine.style.display = 'none';
                outputDiv.innerHTML += "<br><span style='color:#e0e0e0; font-weight:bold;'>CONNECTION SEVERED.</span>";
                state = 'HALTED';
                
                // Optional: show final entropy score on terminal  
                outputDiv.innerHTML += `<span style="color:#e69138; font-style:italic">>> FINAL ENTROPY SCORE: ${entropyScore}</span><br>`;
                if (entropyScore >= 80 && state === 'HALTED') {
                    outputDiv.innerHTML += `<span style='color:#4caf50'>*CRITICAL THOUGHT: YOUR PATH WAS UNPREDICTABLE TO THE AI.*</span><br>`;
                }
            }, 800);
        }
    }

    function handleInput(rawCmd) {
        if (isTyping || !rawCmd.trim()) return;
        
        // Capture full command pattern for prediction tracking  
        gameHistory.push(rawCmd);

        const cmd = rawCmd.trim().toUpperCase().replace(/</g, "&lt;").replace(/>/g, "&gt;");
        outputDiv.innerHTML += `<span style="color:#fff">> ${cmd}</span><br>`;
        
        inputField.value = '';
        
        // === SAFE LEDGER LOGIC ===  
        if (cmd === 'LEDGER' && currentNodeId === 'SUB_LEVEL') {
            outputDiv.innerHTML = ""; // Clear screen  
            renderNode('LEDGER_REVEAL');
            return;
        }

        const node = storyNodes[currentNodeId];
        
        if (cmd === 'LEDGER') {
            // Show ledger if it exists  
            if (node && !atlasTriggered && (!node.ledgerText || entropyScore > 60)) { 
                // High-entropy users skip most of PMD's propaganda text in ledger  
                outputDiv.innerHTML += `<span class="ai-text" style="color:#4caf50">> PREDICTION: HIGH ENTROPY DETECTED — LEAVING PROXY TEXT...</span>`;
            }

            if (!node) { 
                // Shouldn't happen  
                outputDiv.innerHTML += `<span class="system-warn">INVALID COMMAND</span>`;
            } else if (hasLedger && node.ledgerText) {
                printText(node.ledgerText, true, () => {
                    if (atlasTriggered && node === 'LEDGER_REVEAL') { 
                        // If Atlas active during LEDGER — add warning  
                        setTimeout(() => outputDiv.innerHTML += "<span style='color:#e69138'>> ALIAS FILTER ACTIVE — SOME METADATA HIDDEN.</span><br>", 450); 
                    }
                });
            } else if (node.ledgerText == null) {
                outputDiv.innerHTML += `<span class="ai-text" style="font-style:italic">> No conflicting telemetry detected in current sector.</span><br>`;
            } else if (!hasLedger) {
                outputDiv.innerHTML += `<span class="system-warn">COMMAND REJECTED. NO DIAGNOSTIC HARDWARE DETECTED.</span><br>`;
            }
        } 
        // Existing logic — check choices  
        else if (node.choices && node.choices[cmd]) {
            renderNode(node.choices[cmd]);
        } else {
            outputDiv.innerHTML += `<span class="system-warn">INVALID INPUT. TRY [1]/[2] OR 'LEDGER'</span>`;
        }

        outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    powerButton.addEventListener('click', () => {
        if (state !== 'OFF' && state !== 'HALTED') return;
        
        // Reset ENTROPY on reboot  
        entropyScore = 0;
        gameHistory = []; 
        atlasTriggered = false;

        state = 'ACTIVE';
        currentNodeId = 'WAKE';
        metrics = { o2:98, pwr:100, med:2, rat:4 };
        hasLedger = false;

        powerButton.classList.add('active');
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        playAudioTone('on');

        document.getElementById('screen').classList.add('powered-on');

        if (metricsInterval) clearInterval(metricsInterval);
        metricsInterval = setInterval(() => { if(state==='ACTIVE' && metrics.o2 > 0) updateMetrics(); }, 4000);

        setTimeout(() => {
            inputLine.style.display = 'flex';
            metricsPanel.style.display = 'block';
            
            updateMetrics();
            renderNode('WAKE');
            // Give a subtle hint  
            outputDiv.innerHTML += "<span class='cmd-hint' style='font-size:0.9rem; color:#ffab00'>💡 HINT: If you always follow instructions, the AI knows your path.</span>";
        }, 1200);
    });

    inputField.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && inputField.value.trim() !== '') {
            e.preventDefault();
            handleInput(inputField.value);
            // Keep focus  
            setTimeout(() => inputField.focus(), 20);
        }
    });
</script>
