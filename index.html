<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOON_BASE_TERMINAL v1.04 • AIRLOCK A-7</title>
    <style>
        /* === RETRO TERMINAL AESTHETICS (WITH PHYSICS-APPROPRIATE GRIMINESS) === */
        body {
            margin: 0;
            background: #050500; /* lunar darkness black */
            color: #dcdcdc;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Scanlines and phosphor bloom via pseudo-elements */
        #terminal::before,
        #terminal::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            z-index: -1;
        }
        /* Scanlines (like a CRT, not LCD) */
        #terminal::before {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%;
        }
        /* Subtle screen curvature and phosphor persistence glow */
        #terminal::after {
            background: radial-gradient(circle at center, transparent 75%, rgba(0, 0, 0, 0.8) 100%);
            box-shadow: inset 0 0 8rem rgba(216,203,156,0.3); /* yellowish bloom */
        }

        #terminal {
            width: 92%;
            max-width: 960px;
            height: 90vh;
            padding: 1.5rem;
            border: 2px solid #8b7c6e; /* aluminum frame color */
            border-radius: 3rem 2rem / 4rem 3rem;
            background-color: #1f211b; /* deep CRT grey-black */
            box-shadow:
                0 0 1rem rgba(0, 255, 90, 0.0),
                inset 0 0 80px #171a14;
            display: flex;
            flex-direction: column;
        }

        #boot-log {
            font-family: "Courier New", monospace;
            color: #0f0; /* terminal green for boot */
            line-height: 1.3rem;
            overflow-y: auto;
            white-space: pre-wrap;
            height: 45%;
        }
        
        .crt-line {
            animation: phosphorFade 2s forwards;
        }

        @keyframes phosphorFade { from { opacity: 1; text-shadow: 0 0 6px #3f9; } to { opacity: 0.75; } }

        #status-bar {
            margin: 1rem 0 1.25rem;
            font-weight: bold;
            border-top: 2px solid rgba(0, 255, 90, 0.3);
            border-bottom: 2px solid rgba(0, 255, 90, 0.3);
            padding: 0.4rem 0;
            color: #e76; /* warning yellow */
        }

        #history {
            flex-grow: 1;
            overflow-y: auto;
            font-family: "Courier New", monospace;
            font-size: 1rem;
            line-height: 1.5;
            padding: 0;
            color: #dcdcdc;
            white-space: pre-wrap;
        }
        .message { margin-bottom: 0.9rem; }
        .system-text { color: #8ad6a2; } /* cool system green */
        .warning { color: #fca; text-shadow: 1px 0 3px rgba(255,0,0,0.7); }
        .item-get { color: #d8e9ff; font-weight: bold; }
        
        #input-area {
            display: flex;
            margin-top: auto;
            position: relative;
            align-items: center;
            background-color: rgba(12,13,10, 0.95);
            padding: 0.5rem 1rem;
            border-radius: 0 0 3px 3px;
        }
        #prompt { margin-right: 8px; color: #0f0; font-weight: bold; }
        #input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            caret-color: #d3f728; /* glowing terminal cursor */
        }
        
        /* CRT Flicker animation — subtle but present, not migraine-inducing */
        @keyframes flicker {
            0% { opacity: .995 }
            5% { opacity: .96 }
            10% { opacity: .975 }
            15% { opacity: .94 }
            20% { opacity: .98 }
            50% { opacity: .96 }
            80% { opacity: .97 }
            100% { opacity: .993 }
        }
        #terminal > * { animation: flicker 0.1s infinite; }

        /* Scrollbar styling (minimal) */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0c0d0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3f4739;
        }

    </style>
</head>
<body>

<div id="terminal">
    <div id="boot-log"></div>
    <div id="status-bar">STATUS: [AIRMIX 92%] | OXYGEN: [2hr15m] | COMMS: OFFLINE • SECURE</div>
    
    <!-- Game history goes here -->
    <div id="history" onclick="document.getElementById('input').focus()"></div>
    
    <!-- Input area with sound feedback -->
    <form id="input-area">
        <span id="prompt">user@luna-airlockA7:~$</span>
        <input type="text" id="input" autocomplete="off" spellcheck="false" autofocus>
    </form>
</div>

<script>
/**
 * MECHANICAL KEYBOARD AUDIO FEEDBACK  
 * (uses Web Audio API — pure oscillator, no samples)
 */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let lastClickTime = 0;

function playKeySound(char) {
    if (!char || char.length > 1 || /[^A-Za-z0-9!@#$%^&*()_+-={}|;':",./<>?\$\\$`~\s]/.test(char)) return;
    const now = audioCtx.currentTime;
    
    // If space or enter — slightly heavier "thock"
    if (char === ' ') {
        playClick(now, 850, 'square', -30); 
        setTimeout(() => playClick(now+0.04, 120, 'triangle', -10), 12);
    } else if (char === '\r') {
        playClick(now, 950, 'sawtooth', -28);
        setTimeout(() => playClick(now+0.07, 350, 'sine', -18), 25);
    } else {
        // Classic IBM Model M-style click (fast decay)
        const duration = Math.random() * 45 + 45; // 45-90ms
        const pitchBase = char.toUpperCase().charCodeAt(0) % 7 === 0 ? 1024 : 
                         (char.toUpperCase().charCodeAt(0) % 3 === 0 ? 1400 : 820);
        playClick(now, pitchBase, 'square', -25);
    }
}

function playClick(t, freq, waveType, gaindB) {
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    // Avoid clicking when changing gain by using ramp
    gainNode.gain.setValueAtTime(0, t);
    gainNode.gain.linearRampToValueAtTime(Math.pow(10, gaindB / 20), t + 0.01);
    gainNode.gain.exponentialRampToValueAtTime(0.001, t + duration / 1000);

    osc.frequency.value = freq;
    osc.type = waveType;
    // Filter to make it less ear-splitting
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = char === '\r' ? 1800 : (char === ' ' ? 600 : 3500);

    osc.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(t + 0.2);
}


/**
 * GAME ENGINE — MINIMAL STATE, MAXIMUM IMPACT
 */
const game = {
    room: "airlock",
    inventory: [],
    status: { oxygenHours: 2.25, oxygenMins: 15 },
    objectives: {
        checkAir: false,
        powerUpTablet: false,
        runDiagnostics: false,
        commsAvailable: false
    },
    cluesFound: []
};

const bootSequence = [
    "> SYSTEM CHECK...",
    "  - Core OS... [OK]",
    "  - Hydroponics Control... [UNREACHABLE]",
    "  - Structural Integrity... [91%]", 
    "> AIR LOCK SEALS ENGAGED — E-MAJOR EVENT #L7",
    "> SECURITY OVERRIDE ACTIVE (KEY: COLD START)",
    "> INITIALIZING TERMINAL INTERFACE...",
];

let lineCount = 0;

// Boot animation with sound (every time a character prints, it feels tactile)
async function bootUp() {
    const logEl = document.getElementById("boot-log");
    let delay = 300;
    
    // Initial silence — just start typing
    const keyBuffer = bootSequence.join("\n") + "\n";
    
    // Simulate slow boot with typewriter effect
    for (let i = 0; i < bootSequence.length; i++) {
        const span = document.createElement("div");
        span.textContent = bootSequence[i];
        logEl.appendChild(span);
        playKeySound('\r');
        await wait(delay + Math.random()*200);
        if (delay > 50) delay -= 25; // boot gets faster
    }

    playKeySound('\n');
    
    document.getElementById("boot-log").style.display = 'none';
    
    game.addOutput("> CONNECTION ESTABLISHED\n" + 
                  "> WARNING: Airlock A-7 sealed at 03:42 UTC (Event L7).\n" +
                  "> You are the sole occupant.\n");
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

const historyEl = document.getElementById('history');

// Main output function (with scroll control & line limits for realism)
game.addOutput = function(text, type = "normal") {
    // Preserve only last ~30 lines of scrolling
    const allLines = historyEl.textContent.split('\n').filter(Boolean);
    if (allLines.length > 24) {
        const toRemove = allLines.length - 24 + Math.ceil(Math.random());
        allLines.splice(0, toRemove); 
        // Update innerText only for performance
        historyEl.innerHTML = allLines.map(l => `<div class="message">${l}</div>`).join("\n");
    }

    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${type === 'system' ? 'system-text' : type === 'warn' ? 'warning' : ''}`;
    msgDiv.textContent = text;

    historyEl.appendChild(msgDiv);
    
    // Auto-scroll
    historyEl.scrollTop = historyEl.scrollHeight;
};

game.handleInput = async function(cmd) {
    const cleanCmd = cmd.trim().toLowerCase();
    if (cleanCmd.length > 0) {
        this.addOutput(`user@luna-airlockA7:~$ ${cmd}`, "normal");
        playKeySound('\r');
        playKeySound('\n');

        await processCommand(cleanCmd);
    }
};

// THE REAL WORKHORSE — where every decision matters
async function processCommand(cmd) {
    const words = cmd.split(/\s+/);

    if (!words[0] || words.length === 0) return;

    switch(game.room) {
        case "airlock":
            // AIRLOCK A-7 SCENARIOS  
            
            // Look around
            if (["look", "l"].includes(words[0])) {
                if (words.includes("viewport")) {
                    game.addOutput(
                        "Through the cracked viewport, corridor B is pitch-black — no motion in any camera.\n" + 
                        "Except… a faint flicker at Junction 5. Maybe? You'll have to go there to check.", "normal");
                }
                else if (words.includes("console") || words.includes("terminal")) {
                    game.addOutput(
                        "[Comms Console]\n" +
                        "  Screen shows: ‘TRANSMIT FAILURE – T/R MODULE OFFLINE’. \n" +
                        "  Red LEDs blink: M.2.01 – FREQ STANDBY — [357MHz] NOT LOCKED.", "normal");
                    game.cluesFound.push("frequency=357");
                }
                else if (words.includes("locker") || words.includes("lock")) {
                    game.addOutput(
                        "The emergency locker’s magnetic bolt is still armed. A label says: \n" +
                        "  'DO NOT OPEN — CONTAMINATION RISK' \n" + 
                        "  ...but it's not locked. You have access.", "warn");
                }
                else if (words.includes("table") || words.includes("terminal")) {
                    game.addOutput(
                        "Your personal tablet dock is powered but unresponsive: ‘NO BATTERY DETECTED’. \n" + 
                        "It needs its own charge — the base grid won't speak to sealed sectors.", "system");
                }
                else if (words.length < 2 || words.includes("room")) {
                    game.addOutput(
                        `STATUS UPDATE\nOXYGEN REMAINING: ~${Math.floor(game.status.oxygenHours)}h ${game.status.oxygenMins}m\n` +
                        "\n" + 
                        "[Airlock A-7 — Main Chamber]\n" + 
                        " • A heavy bulkhead door — sealed, with 'ACCESS DENIED' pulsing in red.\n" + 
                        " • Comms Console: dead except for standby blink. \n" + 
                        " • Emergency Locker: open (magnets disengaged post-event?)\n" +
                        " • Maintenance Tablet: requires local power (battery gone).", "system");
                }
            }

            // Open locker
            else if (words[0] === ["open"].includes(words[0]) || words.includes("locker") && words.length < 3) {
                game.addOutput(
                    "You pull the emergency lever — *CLUNK!* — magnetic bolts release with a hiss.\n" + 
                    "Inside:\n" + 
                    "   • Portable air filter kit (basic CO2 scrubber)\n" + 
                    "   • Emergency flashlight (4xAA, 6hr runtime) \n" + 
                    "   • Battery pack (9V backup — tiny but *is* usable.\n)", "normal");
                
                game.inventory.push("filter", "flashlight", "battery_9v");
                // Only if you say so
            }

            // Use flashlight to see into corridor (requires flashlight in inventory)
            else if ((words.includes("flashlight") || words.includes("use")) && game.inventory.includes("flashlight") && words.includes("corridor") || 
                    (["flashlight","laserpen","shine"].includes(words[0]) && ["corridor","hall"].some(w => cmd.includes(w)))) {
                if (!game.inventory.includes("flashlight")) {
                    game.addOutput(
                        "You pat your suit pockets. Nothing. Maybe it's in the locker…\n", "warn");
                }
                else {
                    game.addOutput(
                        "*Click* \n\n" +
                        "A pale white beam cuts through the gloom: the bulkhead's emergency lights flicker weakly — you're safe.\n" + 
                        "In corridor B, light glints off glass: a shattered panel near Junction 5. And… wires hanging loose?\n" + 
                        "*Could be the power surge that knocked out your terminal.*", "normal");
                    
                    if (!game.cluesFound.includes("loose_wires")) {
                        game.addOutput(
                            "There's an unshielded spool labeled 'COMMS-BACKUP / RED' nearby.", "system");
                        game.cluesFound.push("loose_wires");
                    }
                }
            }

            // Comms console actions  
            else if (words.includes("console") || words[0].includes("comms")) {
                if (!game.inventory.includes("battery_9v")) {
                    game.addOutput(
                        "The console hums… but no power. It draws 4W — way more than your main systems use idle.\n" +
                        "*Earth needs clear transmission, not just a light.*\n", "warn");
                }
                else if (!game.cluesFound.includes("loose_wires")) {
                    game.addOutput(
                        "You flip the transmit override. LEDs scream ‘ERROR – TRANSDUCER FAIL’.\n" + 
                        "A warning flashes: \n  >> ‘Antenna array not responding. Verify line integrity at Junction 5.’\n", "warn");
                }
                else {
                    game.addOutput(
                        "[DIAGNOSTIC OUTPUT]\n" + 
                        "- Voltage: 32V (STABLE)\n" +
                        "- T/R module temperature: CRITICAL → COOLING FANS OFF\n" +
                        "- Signal path broken: COMMS-BACKUP / RED (J5) \n", "system");

                    // The *real* choice comes in
                    game.addOutput(
                        "*Would you like to bypass the safety interlock at J5?* (Requires: battery + wires + 12V rating)\n" +
                        ">  Y/n (yes/no)", "normal");
                    
                    if (words.length > 1 && ["yes", "y"].includes(words[1])) {
                        await wait(600);
                        game.addOutput(
                            "*You twist the red spool onto the terminal's antenna post. The lights go steady — but now… silence.*\n" + 
                            "Transmit button lit… but you haven’t selected a carrier wave yet.\n" + 
                            "[COMMS MODES AVAILABLE]\n" +
                            "   1. LOW-BAND — Slow, robust, Earth picks up (takes 7min to connect)\n" +
                            "   2. BURST — Instant, high-power, but can be mistaken for debris impact.\n", "normal");
                    }
                }
            }

            // Battery + filter use cases (system logic: air first? power later?)
            else if ((words[0].includes("air") || words.includes("scrub")) && game.inventory.includes("filter")) {
                game.status.oxygenHours += 1; // give one hour more
                game.status.oxygenMins = 59;
                game.addOutput(
                    "You slot in the scrubber cartridge and run cycle: \n" + 
                    "> CO₂ levels: 0.7% → 0.2%\n" +
                    "*Air tastes crisper now.* Oxygen extended: ~3 hours total.\n", "system");
                
                game.inventory.splice(game.inventory.indexOf("filter"),1); // one-use filter
            }
            
            else if (words[0] === "help") {
                game.addOutput(
                    `COMMANDS:
 - LOOK [object]
 - OPEN [locker|door]
 - USE [battery, flashlight] [on object]
 - INVENTORY / i  
`, "normal");
            }
            else if (["inv","i"].includes(words[0])) {
                const inv = game.inventory.length ? 
                        `Inventory: ${game.inventory.map(x => "["+x+"]").join(" ")}` :
                        "Empty";
                game.addOutput(inv);
            }
            
            // Endings (basic state triggers)
            else if (words[0] === ["wait", "rest", "sleep"].includes(words[0])) {
                await wait(800);
                game.status.oxygenHours -= 0.3;
                if (game.status.oxygenHours <= 0) ending("asphyxiation");
                else {
                    game.addOutput(
                        "*You sit back and stare at the blinking airlock status light…* \n" + 
                        "34 minutes pass.\nOxygen depletes: 3hr02m → 2hr59m.\n", "system");
                }
            }
            
            // Power comms
            else if ((words.includes("power") || words.includes("use")) && 
                    words[1]?.includes("battery") &&
                    game.inventory.includes("battery_9v") ) {
                
                if (!game.cluesFound.includes("loose_wires")) {
                    game.addOutput(
                        "*You plug in the battery… but it powers only the flashlight and diagnostics.*\n" +
                        "No signal goes anywhere — Earth wouldn't know you exist.", "warn");
                } else if (game.inventory.includes("flashlight") || words.length>2 && 
                    ["connect", "splice"].some(w => words.some(wd => wd.includes(w)))) {
                    game.addOutput(
                        "You bypass the junction. Wires spark but don’t smoke.\n" +
                        "The tablet hums awake with a warning: \n[AC POWER DERATING 96%]\n", "warn");
                    game.status.oxygenMins -= 8; // high drain
                }
                else {
                    game.addOutput(
                        "*Battery connected to console.*\nLEDs shift from red to amber.\n", "system");
                    if (!game.objectives.powerUpTablet) {
                        game.objectives.powerUpTablet = true;
                        game.cluesFound.push("console_active");
                    }
                }
            }

            // Secret ending for cleverness — use all clues together  
            else if (["transmit","send"].includes(words[0]) && game.objectives.commsAvailable && words.includes("earth")) {
                if (!game.inventory.includes("battery_9v") || !game.cluesFound.includes("loose_wires")) {
                    ending("silence");
                } else {
                    ending("reestablished", true); // victory
                }
            }

            else if (cmd.length > 25 && !words.some(w => ["help","look","i"].includes(w))) {
                game.addOutput(
                    "Unknown command: “"+cmd+"”. Type ‘help’ for assistance.\n", "warn");
            }

            break;

        // Future rooms would be handled here
    }

    // Update oxygen status in real-time based on time passing and player choices  
    if (!game.gameOver) {
        const newO2 = (game.status.oxygenHours * 60 + game.status.oxygenMins) - (cmd.length/50);
        if (newO2 <= 0) {
            game.status.oxygenHours = 0;
            game.status.oxygenMins = 0;
            ending("asphyxiation");
        }
        
        const oHr = Math.floor(newO2 / 60);
        const oMin = Math.round(newO2 % 60);

        if (oMin === 60) {
            oHr++; 
            oMin = 0;
        }
        
        // Only update display if things change significantly
        if ((game.status.oxygenHours !== oHr || game.status.oxygenMins !== oMin) &&
            !(Math.abs(game.status.oxygenMins - oMin)<2 && Math.abs(game.status.oxygenHours-oHr)<0.01)) {
            
            const barEl = document.getElementById('status-bar');
            const isDanger = newO2 < 90;
            
            game.status.oxygenHours = oHr; 
            game.status.oxygenMins = oMin;
            if (isDanger) {
                barEl.textContent = `STATUS: [CRITICAL] • OXYGEN: ~${oHr}h ${oMin}m`;
                barEl.classList.add('warning');
            }
            else {
                barEl.innerHTML = `<span style="color:#e76;">STATUS:</span> [AIRMIX 92%] <span style="margin-left:0.5em">OXYGEN:</span> ~${oHr}h ${oMin}m <span style="margin-left:0.5em; color: ${oHr<1 ? '#f00':'#a6e'};">• SECURE</span>`;
            }
        }
    }
}


function ending(type, success=false) {
    game.gameOver = true;
    const msg = {
        "asphyxiation": 
            "*— the red lights stop blinking.*\n" +
            "\n" + 
            "[AIR LOCK A-7 • TERMINATED]\n" + 
            "CO₂: 6.2% — Loss of consciousness: 28 sec\n" +
            "\n" +
            "*Final breath: a quiet hiss in your ears, like wind in lunar craters.*\n" + 
            "MISSION LOG #702 — LAST ENTRY",
            
        "silence": 
            "[COMMS FAILURE]\n" + 
            "No carrier detected.\n" +
            "Your signal was lost before Earth even knew you were sending it.\n\n" + 
            "*…The bulkhead doesn’t open for another 48 hours.*",
        
        "reestablished":  
            "[TRANSMISSION SUCCESS]\n\n" + 
            "*Click —* then silence… then: \n“— this is Apollo-7 Relay, go ahead Lunar Station Echo. Copy?*”\n" +
            "\nYou answer immediately: \n" +
            "> “Airlock A-7 is intact. Single occupant. Need extraction — and help.”\n" + 
            "*They reply within seconds: "I have your beacon in sight. Hold fast, friend."*\n" + 
            "\n\n[MISSION LOG #702 — SAVED]\n" +
            "The door hisses open an hour later — and a face you haven’t seen in weeks stares in:\n" + 
            "Commander Vega, breathing hard: ‘Goddamnit. I told them to wait!’\n"
    }[type];

    game.addOutput("\n*** "+type.toUpperCase().split('_').join(' ')+" ***","warn");
    
    setTimeout(() => {
        msg.split("\n").forEach(line => {
            game.addOutput(line, "normal");
        });
        setTimeout(() => {
            const reboot = () => {
                game.addOutput("[SYSTEM REBOOT INITIATED]\n\n");
                window.location.reload();
            };
            
            setTimeout(reboot, 4500); // After 4.5s of reading, reset
        }, 3000);
    }, 500);
}

// Initialize input handler with keyboard sounds & typing realism
document.getElementById("input-area").addEventListener("submit", (e) => {
    e.preventDefault();
    const cmd = document.getElementById('input').value;
    
    // Sound feedback: play click for each printable char in command (not enter/space yet)
    Array.from(cmd).forEach(c => playKeySound(c));
    game.handleInput(cmd);
    
    document.getElementById('input').value = "";
});

// Also give feedback on SPACE or BACKSPACE
const inputEl = document.getElementById("input");
[inputEl, document].forEach(node =>
  ["keydown","keyup"].forEach(evtType => 
   node.addEventListener(evtType, function(e) {
     // Only real clicks — not arrows/control
     const charCodes = {9:'tab',13:'enter',32:' '}; // key codes
     if (charCodes[e.keyCode] || (e.key.length === 1 && e.key !== "Backspace")) {
         if (!e.ctrlKey && !e.metaKey && !e.altKey)
             playKeySound(e.key);
     }
   })));

// Boot animation and initial text
bootUp();
game.addOutput("\n[SYSTEM READY]"); 
setTimeout(() => {
    game.addOutput("> [WARNING] Airlock integrity compromised in sector A7.\n");
    game.addOutput("> You are safe for now—but how long before the air runs thin?");
}, 600);
</script>
</body>
</html>
