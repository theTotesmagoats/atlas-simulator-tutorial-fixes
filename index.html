<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOON_BASE_TERMINAL v1.05 • AIRLOCK A-7</title>
    <style>
        /* === RETRO TERMINAL AESTHETICS === */
        body {
            margin: 0;
            background-color: #0a0a04;
            color: #dcdcdc;
            font-family: "Courier New", Courier, monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #terminal {
            width: 92%;
            max-width: 800px;
            height: 90vh;
            padding: 2rem;
            border: 3px double #7d6b5e; 
            border-radius: 3.5rem/5rem;
            background-color: #161814; /* dark CRT grey-black */
            position: relative;
        }
        
        #boot-log {
            font-size: 0.9rem;
            color: #4caf50; 
            line-height: 1.5;
            overflow-y: auto;
            height: 45%;
        }
        
        @keyframes flicker { 
            0%,100% {opacity: 1;}
            97% { opacity: .96; }
            98% { opacity: 0.92; }
        }

        #history {
            height: 50%;
            overflow-y: auto;
            margin-bottom: 0.75rem;
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .msg { margin-bottom: 1em; display: block; padding-left: 2ch;}
        .sys-msg { color: #4caf50; }
        .warn { color: #ffd700; text-shadow: 1px 1px 0px #664400; }
        .hint-text { color: #8ab9ff; font-weight: bold;}
        .system-title {
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #d3c5b0;
            font-weight: 700;
        }

        #status-bar {
            border-top: 2px solid #4caf50; 
            padding-top: 8px;
            margin-bottom: 1em;
            text-align: left;
        }
        .oxygen-val { color: #d3c5b0; font-weight: bold; }
        .status-indicator {
            background: #0f2614; color: #8ab9ff;
            border-radius: 3px; padding: 3px 6px;
        }
        
        /* THE HINT MECHANIC — visible only on hover */
        .word-hint-container {
            display: inline-block;
            position: relative;
            cursor: help;
        }
        
        .hint-bubble {
            position: absolute;
            z-index: 100;
            top: 110%;
            left: -5ch;
            width: max-content;
            background: rgba(0, 34, 26, 0.95); /* lunar-greenish black */
            border: 1px solid #4caf50;
            padding: 5px 8px;
            border-radius: 4px;
            color: #aef;
            font-size: 0.9rem;
            white-space: nowrap;
            transform-origin: top left;
            animation: fadeUp 0.3s ease-out forwards;
            opacity: 0; 
        }
        
        @keyframes fadeUp { 
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0px); opacity: 1; } 
        }

        #input-area {
            position: relative;
        }
        #prompt { color: #4caf50; margin-right: 0.5ch; font-weight: bold;}
        #input {
            flex-grow: 1;
            background-color: rgba(15,18,13, 0.9);
            border: none; padding: 6px;
            color: white; font-size: 1rem;
            font-family: "Courier New", monospace;
            caret-color: #aef;
            outline: none;
        }

        .hint-trigger {
            cursor: pointer;
            display: inline-block;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width:8px; background:#0f1310;}
        ::-webkit-scrollbar-thumb {background: #3d463a;border-radius: 8px;}
        
    </style>
</head>
<body>

<div id="terminal">
    <div id="boot-log">Initializing boot sequence…</div>
    
    <!-- The terminal display where all story unfolds -->
    <div id="history"></div>

    <!-- The status line at top of game output area -->
    <div id="status-bar" style="font-size: 1rem;">
        [AIRMIX STABLE] 
        | OXYGEN REMAINING: <span class="oxygen-val" id="oxygen">~3hr02m</span>
        | COMMS STATUS: 
        <span class="status-indicator">OFFLINE</span>
    </div>

    <!-- Game Input Line -->
    <form id="input-area">
        <span id="prompt">user@luna-airlockA7:~$</span>
        <input type="text" id="input" placeholder="[type a command...] (try 'help')" autocomplete="off">
    </form>

    <!-- HINT BUBBLE (hidden unless hovering over word) -->
    <div style="position:absolute; right:-2%; top:30%;" 
         id="hoverHintBox" class="word-hint-container" hidden>
        <div id="hintText"></div>
    </div>
</div>

<script>
// === CORE GAME STATE ===
const game = {
    inventory: [],
    oxygenMins: 182, // starting at ~3h02m (after brief boot time)
    room: "airlock",
    clues: [],
    history: []
};

function getOxygenString() { return `~${Math.floor(game.oxygenMins / 60)}h ${game.oxygenMins % 60}m`; }

const bootText = [
    "[INITIALIZING…]",
    " > Memory self-test... PASS", 
    " > System clock synced (Lunar UTC: 0735)",
    " > ALERT — Event L7 Detected. Airlocks A-G Sealed.",
    " > USER: PLAYER One — No distress signal found in logs.",
    " > Status: Survivable Atmosphere.", 
    " > WARNING — Backup Power Only."
].join("\n") + "\n\n";

const terminal = document.getElementById("history");
const bootDiv = document.getElementById("boot-log");
const statusEl = document.getElementById('status-bar');

function render() {
    // Show only the last 18 messages in history to avoid memory issues
    const lastLines = game.history.slice(-18).join("\n\n"); 
    terminal.innerHTML = lastLines;

    if (game.oxygenMins < 10) { statusEl.innerHTML += '<br><span class="warn" style="display:block">[CRITICAL: OXYGEN LOW]</span>'; }

    document.getElementById("oxygen").innerText = getOxygenString();
}

function bootGame() {
    // Simple typewriter effect
    const charsPerLine = 60;
    
    async function typeLine(line) {
        bootDiv.innerText += "\n";
        const words = line.split(' ');
        let currentLine = '';
        for (let w of words) {
            currentLine += `${w} `;
            if (currentLine.length >= charsPerLine/2) { 
                bootDiv.innerText += currentLine;
                currentLine = ''; await new Promise(r => setTimeout(r, Math.random()*50 + 30));
            } else if (w === "ERROR" || w === "ALERT") {
                 bootDiv.innerText += `<span style="color:#ff9; font-weight:bold">${w} </span>`;
                 await new Promise(r => setTimeout(r, 45));
            }
            else { 
                bootDiv.innerText += `${w} `;
                await new Promise(r => setTimeout(r, Math.random()*60)); // varies typing speed for realism
            }
        }
        if (currentLine) { bootDiv.innerText += currentLine; }
    }

    const lines = [
        "  [BOOT SEQUENCE INITIATED...]", 
        "> Core OS... PASS",
        "> Hydroponics Control… OFFLINE", 
        "> Airlock Seals… ENGINED", 
        "> STRUCTURAL WARNING — Sector A-7 Isolation",
        "> EMERGENCY OVERLAY — E-L7 Activated"
    ];
    
    lines.forEach(line => setTimeout(() => typeLine(line), 120));
    
    setTimeout(() => {
        bootDiv.innerText = bootText + "\n[BOOT COMPLETE]\n\n"; // Replace full boot log
        
        render();
        addHint("look [object]", "Type 'look' followed by an object name to get details (e.g. 'look console')", "#cde");
    }, 3800); 
}

function parseCmd(input) {
    if (!input.trim()) return;
    
    // Sanitize for storage & readability  
    game.history.push(`user@luna-airlockA7:~$ ${input}`);
    const words = input.toLowerCase().trim().split(/\s+/);

    switch(game.room) {

        case "airlock":

            // --- LOOK ---
            if (words[0] === "look") {
                let target = words.slice(1).join(' ');

                // look room, general, everything
                if (["", "room","every"].includes(target)) {
                    game.history.push("[Airlock A-7 — Main Chamber]\n • Bulkhead: sealed (ACCESS DENIED)\n" +
                                      " • Comms Console: standby LEDs flicker red\n" + 
                                      " • Emergency Locker: open (magnets disengaged?)\n" +
                                      " • Tablet Dock: screen dark (battery missing)", "sys");
                    game.history.push("Tip: Try looking at the *console*, *locker*, or *tablet*."); addHint('look console','Type "look console" to inspect communications equipment','#4caf50');
                }

                // look console
                else if (target.includes("con") || target.includes("transmit")) {
                    game.history.push("[COMMS CONSOLE]\nStatus: Transceiver offline. LED pattern says:\n- FREQ UNLOCKED → 357 MHz\n- T/R MODULE: HOT", "sys");
                    game.clues.push('freq_357', 'needs_wiring');
                    addHint('transmit','You can't use the console without fixing power first','warn'); 
                }

                // look locker / lock
                else if (target.includes("lock") || target.includes("emerg")) {
                    game.history.push("Inside:  • CO2 Scrubber Kit (single use)  • Battery pack (9V, spare)\n" +
                                     "• Flashlight (heavy-duty), marked ‘EMERG-USE ONLY’.", "sys");
                    
                    if (!game.inventory.includes('filter')) game.inventory.push('filter', 'batt_9v');
                    addHint('use battery','After taking it from the locker, you must use it: type "use battery console"'); 
                }

                // look tablet / screen
                else if (target.includes("tab") || target.includes("dock")) {
                    game.history.push("[MAINTENANCE TABLET]\nDock indicator shows NO POWER.\nThe battery seems to be missing — possibly during the E-L7 event.", "sys");
                    addHint('battery','It was inside the locker! Use it: "use batt_9v on tablet"', 'warn'); 
                }
                
                // look viewport
                else if (target.includes("view")) {
                    game.history.push("[Viewport] You see: Pitch darkness outside, and—flickering at Junction 5!\nA thin wire spool glints under broken conduit.");
                    game.clues.push('j5_flicker');
                }
                
                else game.history.push(`What? Look where? Try: 'look [console|tablet|locker|viewport]'.`);
            }

            
            // --- INVENTORY ---
            if (words[0].includes("i")) { // inv or inventory
                game.history.push("[Inventory]");
                if (game.inventory.length === 0) game.history.push("* Empty *");
                else game.inventory.forEach(i => game.history.push(` • ${i.replace("_"," ")}`));
            }

            // --- HELP ---
            if (words[0].includes("help") || words.length === 1 && words.includes('?')) {
                game.history.push("\n** COMMAND REFERENCE **");
                [
                    ["look [obj]", "Examine environment"], 
                    ["inv", "Check items you carry"], 
                    ["open locker","Retrieve supplies (if available)"], 
                    ["use [item] [target]","Try: use batt_9v console (to fix power)","use flashlight corridor"]
                ].forEach(([cmd,desc]) => {
                    game.history.push(`  > ${cmd.padEnd(18)} - ${desc}`);
                });
            }

            // --- USE (THE REAL GAMEPLAY) ---
            
            // 1. use battery
            if (words[0] === "use" && words[1]?.includes("batt")) {
                if (!game.inventory.includes("batt_9v")) { game.history.push("*Battery pack? You haven't taken one yet.* Try: open locker"); }
                else {
                    const target = words.slice(2).join(' ');
                    
                    if (target.includes("tab") || target.includes("dock")) {
                        game.inventory = game.inventory.filter(i => i !== "batt_9v");
                        game.history.push("*You insert the spare 9V battery…*\nThe tablet hums to life. \n> Screen says: “BASE GRID INTEGRITY COMPROMISED”", "sys");
                        addHint('diagnostic', 'If you have a terminal, try: use diagnostic.txt console');
                    }

                    if (target.includes("con")) {
                        game.history.push("*You plug battery directly into comms backup…*\nLEDs flicker but still red.\nThe unit is starved — the real problem’s in Junction 5.", "warn");
                        addHint('wiring', 'Check the corridor first with flashlight, then fix wiring at J5');
                    }
                }
            }

            // use flashlight corridor (hint hint: see loose wires)
            if (words[0] === "use" && words[1]?.includes("flash")) {
                const target = words.slice(2).join(' ');
                if (target.includes("corrid") || target.includes("outside") || target.includes("hallway")) {
                    game.history.push("*You turn on the flashlight…* A pale white beam sweeps down corridor B.", "normal");
                    if (!game.clues.includes("loose_wires_j5")) {
                        setTimeout(() => {
                            game.history.push("A spool of red shielding cable hangs from broken conduit.\nLabels read: 'BACKUP / J5 – 357 MHz'.", "sys");
                            game.clues.push('loose_wires_j5');
                            addHint('splice', 'You can fix the signal here if you have a splice tool—or maybe the console knows?','warn'); 
                        }, 200);
                    }
                } else game.history.push("*The beam just shows walls.* Try pointing it down corridor B.");
            }

            
            // --- OPEN (Locker) ---
            if (words[0].includes("open")) {
                const obj = words[1];
                
                if (obj.includes("lock")) { 
                    if (!game.inventory.includes("filter")) { game.inventory.push("flashlight"); }
                    
                    if (!game.clues.includes("items_in_locker") ) {
                        setTimeout(() => game.history.push("The magnetic release disengages with a hiss — you’re in.","sys"), 300);
                    } else {
                        setTimeout(() => game.history.push("Locker empty now, but the air smells faintly of ozone.","sys"),250); 
                    }
                    addHint('battery', 'Check inside for spares.'); // teach player
                } 
                
                else if (obj.includes("door")) { game.history.push("*You push the emergency release —*\nNothing. The door’s sealed tighter than a vacuum flange.","warn"); }
            }

            // --- TRANSMIT (FINAL PROGRESSION) ---
            
            // You need:
            // [ ] battery on console → done via "use batt con"  
            // [ ] J5 wires fixed (needs flashlight first!)  
            if ((words[0] === "transmit") || (input.toLowerCase().includes("send")) ) {
                
                if (!game.inventory.includes("batt_9v")) game.history.push("Wait—you can't just send from a dead unit!");
                else if (!game.clues.includes('loose_wires_j5')) game.history.push("*Transmitter LEDs glow — then flicker red.*\nThe antenna cable is broken.", "warn");
                
                else {
                    setTimeout(() => { 
                        game.history.push("\n*** TRANSMISSION SEQUENCE ***", 'system');
                        
                        let seq = [ 
                            "[SET: FREQ 357.2MHz… OK]", 
                            "[VERIFY WIRE INTEGRITY… FAILED]"]; // Wait—J5 needs repair!

                        if (game.clues.includes("j5_repaired")) {
                            game.history.push(
                                "*Signal spikes. Antenna confirms lock.\n\n[TO: APOLLO 7 RELAY]\nFrom: A-7 AIRLOCK.\nMessage: Surviving solo — oxygen ~1h30m left—need extraction.",
                                "warn");
                            
                            game.oxygenMins -= 4; // high power transmission uses extra air

                            setTimeout(() => ending('rescue'), 1800);
                        } else {
                            seq.push(
                                "> Reconnecting splice at Junction 5…\n",
                                "*You find the exposed spool.* Do you fix it now?");
                            
                            addHint('splice', 'Use wire splice on junction — but watch out: one wrong move triggers fault');
                        }

                        game.history = game.history.concat(seq);
                    }, 600); 
                }
            } else if (words.length === 1 && words[0].startsWith("sp")) { // typo / partial
                 game.history.push("*Signal degraded. Try 'splice junction' or inspect wire more closely.");
             }

            
            break;
        default: game.history.push("> Error — Unknown command syntax or room state."); 
    }

    // Drain oxygen over time
    game.oxygenMins -= input.trim().length > 0 ? (input.trim().length / 6.3) : 0; 
    
    // Check for end condition (sudden asphyxiation or success)
    if (game.oxygenMins <= 0 && !endingCheck('asphyx')) { 
        game.history.push("\n\n*You gasp once — twice.*\nThe oxygen level is critical. Black spots dance at the edge of vision.\nNo more commands are possible.", "warn"); 
        endingCheck("asphyx"); return; 
    }
    
    if (game.oxygenMins < 60) { statusEl.classList.add('crt-warning'); } // subtle alert
    
    render();
}

function endingCheck(what) {
    if (game.gameOver) return true;
    
    const history = game.history.filter(s => !s.includes("sys")).join("");
    if (what === "asphyx") { 
        game.gameOver = true; setTimeout(() => window.location.reload(), 8000);
    } else if (what === 'rescue') {
        setTimeout(() => {
            endingCheck('win');
        },2500); // short delay for effect
    }
    
    return false;
}

function ending(type) {
    const box = document.createElement('div'); 
    box.style.background="#102"; box.style.borderRadius="4px"; box.style.padding="8px"; 
    box.innerText=type==='asphyx'?"ASPHYXIATION\n— the screen goes dark. No signal, no rescue.\nYou leave a note: I was alone.":
                  "SIGNAL LOST?\nTransmission sent—but not in time. Oxygen reached 0%.";

    if (type === 'rescue') { // Success
        setTimeout(() => {
            alert("MISSION STATUS: REESTABLISHED");
            location.reload(); // clean slate for next try 
        },5500); 
    } else { game.history.push("\n\nGAME OVER.\nReload this file to start again.",'warn'); render();}
    
    game.gameOver = true;
}


// === HOVER HINT SYSTEM ===

const hintBox = document.getElementById('hoverHintBox');
let lastHovered;

function addHint(trigger, text, color="#fff") {
    // Add data attribute for tooltip (visible on hover)
    const container = document.createElement("span");
    container.innerHTML = `[ ${trigger} ]`; 
    container.className = "hint-trigger"; 
    container.title=text;
    container.setAttribute("data-hint-text",text);
    
    terminal.appendChild(container);
}

function attachHintsToWords(text) {
    if (!text) return text;
    
    const knownCommands = {
        'look':'Look around — try `look [object]` like `look locker`', 
        'use':'Use item — syntax: use <item> on <target>',
        'inv':'Inventory list — quick way to see what you have.',
        'help':'List all commands with hints.',
        'transmit':'Send signal to Earth (requires power and repaired wiring)'
    };
    
    let out = text;
    Object.keys(knownCommands).forEach(k => {
        const regex = new RegExp(`\\b${k}\\b`, 'g');
        if (regex.test(text)) { 
            // Replace each word with span + tooltip data-attr
            const replaceWord = word => {
                const wrapped = `<span class="word-hint-container">${word}
                    <div class="hint-bubble" style="left:${Math.random()*-5}px">${knownCommands[k]}</div>
                 </span>`;
                
                out = text.replace(new RegExp(word,'g'), () => { 
                    if (lastHovered !== word) {
                        // Avoid duplicate replacement in one run
                        return wrapped; 
                    } else {
                        lastHovered = null;
                        return word; // leave untouched once hovered to reduce noise
                    }
                });
                
            };
            replaceWord(k);
        }
    });
    
    return out; 
}


// === MOUSE EVENTS (desktop + mobile) ===
function setupHints() {
    document.addEventListener('mouseover', e => {
        const span = e.target.closest('.word-hint-container');
        if (span) { 
            const hintText = span.querySelector(".hint-bubble")?.innerText || span.title;
            
            // Set the hint box location near mouse (offset to top right of screen)
            const rect = document.body.getBoundingClientRect(); // fallback
            hintBox.style.position = "fixed"; // Use fixed position for robustness

            const offsetX = 45; // offset slightly so not covered by mouse
            
            hintBox.style.left = `${window.innerWidth/2 + 18}px`; 
            hintBox.style.top = `${Math.max(window.innerHeight-200,rect.height)}px`;

            hintBox.hidden=false;
            
            // Update text
            const bubble = document.getElementById("hintText"); if (bubble) { 
                bubble.innerText= hintText; bubble.style.color = span.getAttribute("data-hint-color") || "#8ab9ff";
                hintBox.setAttribute("title",""); // Clear default tooltip so we control it
                
                lastHovered = null; // reset 
            }
        } else if (!hintBox.hidden) { 
            hintBox.hidden = true;
            lastHovered=null;
        }
    });

    // mobile tap support
    document.addEventListener('click', e => {
        const span = e.target.closest('.word-hint-container');
        if (span && span.querySelector('.hint-bubble')) { 
             span.querySelector(".hint-bubble").style.background = "rgba(120,56,87,0.95)";
        }
    });

    document.getElementById('terminal').addEventListener('mouseout', () => {
        hintBox.hidden=true;
    });
}


// === GAME LOOP STARTUP ===
function mainLoop() {

    setupHints();

    bootGame(); // kicks off text & timer

    // Input event (keyboard sound still possible via simple click, but disabled by default)
    const inputEl = document.getElementById('input');
    inputEl.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !game.gameOver) { 
            parseCmd(this.value);
            this.value = '';
            
            // Small delay before focus returns
            setTimeout(() => this.focus(), 35); 

            // Scroll down on input for better UX
            const div = document.getElementById('history'); 
            if (div) div.scrollTop = div.scrollHeight; 
            
        } else if (e.key.length === 1 && !game.gameOver && Math.random() > .80) { 
            playClickSound(); // Optional — keep it quiet, just one beep
        }
    });
}

function playClickSound() {
    try { 
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!audioCtx.state) audioCtx.resume();
        const osc = audioCtx.createOscillator(), gainNode= audioCtx.createGain();

        // mechanical sound model
        const tone = 1800, dur=75/1000; 
        gainNode.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.type="sawtooth"; osc.frequency.value = tone;
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);

        osc.start(); osc.stop(audioCtx.currentTime+dur);
        
    } catch(err) {/* ignore if browser blocks audio */ }
}


// Init!
mainLoop();

// Auto-add hint on start  
setTimeout(() => { 
    terminal.innerHTML = 
    "<span class='sys-msg' id='intro'>\n> CONNECTION ESTABLISHED\n" + 
    "WARNING: You are the only survivor of Event L7.\nAirlock A-7 sealed for your protection." +
    "</span><br><div class='msg' id='hintStart'></div>\n";

},160);
</script>

<script> document.getElementById('hint-style').textContent = 
`#hoverHintBox { font-family:"Courier New"; z-index:9999 !important; transform-origin:center bottom !important;}`
</script>
</body>
