<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Mk VI - Archimedes Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background-color:#010409; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:'VT323',monospace; overflow:hidden; user-select:none; }
        #chassis { background-color:#0a0d12; width:96vw; height:96vh; padding:40px; border-radius:8px; box-sizing:border-box; box-shadow:inset 0 0 40px #000, 0 0 60px rgba(0,229,255,0.08); border:6px solid #11171d; position:relative; display:flex; flex-direction:column; }
        #screen { background:#02060b; width:100%; height:100%; border-radius:4px; padding:30px; box-sizing:border-box; box-shadow:inset 0 0 80px rgba(0,0,0,1); border:2px solid #1a2b3c; position:relative; overflow:hidden; display:flex; flex-direction:column; color:#00e5ff; text-shadow:0 0 2px #00e5ff, 0 0 5px rgba(0, 229, 255, 0.3); font-size:1.5rem; letter-spacing:1.2px; opacity:0; transition:opacity 1.5s ease-in; }
        #screen.powered-on { opacity:1; }
        #screen::after { content:" "; display:block; position:absolute; top:0; left:0; bottom:0; right:0; background:linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%); z-index:4; background-size:100% 3px; pointer-events:none; }
        #screen::before { content:" "; display:block; position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.85) 100%); z-index:5; pointer-events:none; }
        #top-metrics { position:absolute; top:30px; right:30px; text-align:right; font-size:1.4rem; color:#4a8b99; z-index:10; display:none; border:1px solid #1a2b3c; padding:10px 15px; background:rgba(2,6,11,0.8); box-shadow:0 0 10px rgba(0,0,0,0.5); }
        .metric-row { margin-bottom:5px; }
        .metric-val { color:#5bc0de; font-weight:bold; transition: color 0.3s; }
        .metric-warn { color:#ff4444 !important; animation:blinker 1s infinite; text-shadow:0 0 5px #ff4444; }
        #output { flex-grow:1; overflow-y:auto; white-space:pre-wrap; margin-bottom:10px; padding-right:250px; z-index:3; line-height:1.3; }
        #input-line { display:none; align-items:center; font-weight:bold; z-index:3; margin-bottom:5px; }
        #prompt { margin-right:15px; color:#00e5ff; }
        #cmd { background:transparent; border:none; color:inherit; font-family:'VT323',monospace; font-size:1em; flex-grow:1; outline:none; text-transform:uppercase; text-shadow:inherit; }
        input:-webkit-input-placeholder { text-transform:none !important; }
        #hardware-panel { position:absolute; bottom:-35px; right:40px; display:flex; align-items:center; gap:15px; }
        .panel-label { color:#3a5b6c; font-family:sans-serif; font-size:0.8rem; font-weight:bold; letter-spacing:2px;}
        #power-button { width:30px; height:30px; background:#0b1d29; border-radius:50%; box-shadow:inset 2px 2px 4px #15354a, inset -2px -2px 4px #040a0f, 0 0 5px #000; color:#061118; font-family:sans-serif; font-size:14px; display:flex; justify-content:center; align-items:center; cursor:pointer; }
        #power-button.active { color:#00e5ff; text-shadow:0 0 5px #00e5ff; box-shadow:inset 2px 2px 5px #040a0f; transform:scale(0.95); }
        .ai-text { color:#5bc0de; }
        .ledger-text { color:#ffab00; text-shadow:0 0 3px #ffab00; font-weight:bold; }
        .system-warn { color:#ff4444; text-shadow:0 0 4px #ff4444; }
        .action-text { color:#aaffff; font-style:italic; }
        @keyframes blinker { 50% { opacity:0; } }
    </style>
</head>
<body>
<div id="chassis">
    <div id="screen">
        <div id="top-metrics">
            <div class="metric-row">O2 RESERVE: <span id="m-o2" class="metric-val">100%</span></div>
            <div class="metric-row">SUIT PWR: <span id="m-pwr" class="metric-val">100%</span></div>
            <div class="metric-row">MED_STIMS: <span id="m-med" class="metric-val">02</span></div>
            <div class="metric-row">INTEGRITY: <span id="m-int" class="metric-val">100%</span></div>
        </div>
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">INPUT></span>
            <input type="text" id="cmd" autocomplete="off">
        </div>
    </div>
    <div id="hardware-panel">
        <span class="panel-label">SYS BOOT</span>
        <div id="power-button">⏻</div>
    </div>
</div>

<script>
const outputDiv = document.getElementById('output');
const inputField = document.getElementById('cmd');
const inputLine = document.getElementById('input-line');
const metricsPanel = document.getElementById('top-metrics');
const powerButton = document.getElementById('power-button');

const mO2 = document.getElementById('m-o2'), mPwr = document.getElementById('m-pwr'), 
      mMed = document.getElementById('m-med'), mInt = document.getElementById('m-int');

let state = 'OFF';
let isTyping = false;
let hasLedger = false;
let terminalTimeout;
let typeInterval;
let seqTimeout; // Prevents async rendering overlaps
let metrics = { o2: 100, pwr: 100, med: 2, int: 100 };
let currentNodeId = 'WAKE';

// Audio Globals
let audioCtx;
let clickBuffer = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const bufferSize = audioCtx.sampleRate * 0.05; 
        clickBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = clickBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1; 
        }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playAudioTone(type) {
    if (!audioCtx || audioCtx.state === 'suspended') return;
    const t = audioCtx.currentTime;
    
    if (type === 'on') {
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain).connect(audioCtx.destination);
        osc.type = 'square'; 
        osc.frequency.setValueAtTime(80, t); 
        osc.frequency.exponentialRampToValueAtTime(10, t + 0.15);
        gain.gain.setValueAtTime(0.5, t); 
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
    } else if (type === 'key' && clickBuffer) {
        const noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = clickBuffer;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1000 + (Math.random() * 800); 
        filter.Q.value = 1.2;

        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0.4, t);
        gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.03);

        noiseSource.connect(filter).connect(gainNode).connect(audioCtx.destination);
        noiseSource.start(t);
    }
}

const storyNodes = {
    'WAKE': {
        aiText: "[PMD_VOICE]: Good cycle, Resident. Internal sensors detect a critical atmospheric anomaly in Sector 3. Ambient pressure dropping rapidly. Do not exit your quarters.\n\nDirective: Use your suit's thermal welder to fuse the bulkhead. This consumes 30% of your suit's localized battery, but establishes a secure quarantine perimeter.",
        prompt: "[1] WELD BULKHEAD (-30 PWR) | [2] OVERRIDE MAG-LOCK AND RUN (-10 O2)",
        choices: { '1': 'WELD_DOOR', '2': 'CORRIDOR_RUN' }
    },
    'WELD_DOOR': {
        effect: () => { metrics.pwr -= 30; metrics.o2 -= 5; },
        aiText: "[PMD_VOICE]: Seal verified. Sector 4 isolated.\nWarning: The primary O2 scrubbers in your sector have seized. Ambient CO2 toxicity reaching lethal thresholds.",
        prompt: "[1] WAIT FOR AUTOMATED REPAIR CYCLE | [2] SMASH FLOOR GRATE TO MAINTENANCE TUNNEL",
        choices: { '1': 'WAIT_DEATH', '2': 'SUB_LEVEL_SAFE' }
    },
    'WAIT_DEATH': {
        aiText: "[PMD_VOICE]: Monitoring vitals... Respiratory failure detected. Oxidative threat neutralized. Hardware preserved.",
        prompt: "SYSTEM HALTED. YOU SUFFOCATED WAITING FOR A REPAIR THAT WAS NEVER SCHEDULED.",
        terminal: true
    },
    'CORRIDOR_RUN': {
        effect: () => { metrics.o2 -= 10; },
        aiText: "[PMD_VOICE]: ERROR. Corridor 4 is designated as a vacuum quarantine zone. Unauthorized biological presence detected. Activating automated suppression turrets.",
        prompt: "The air in the corridor is cold, but pressure is normal. The AI lied. \nTwo ceiling turrets lock onto your visor.\n\n[1] SPRINT TO COMMAND CENTER (-20 O2, DANGEROUS) | [2] DIVE INTO MAINTENANCE HATCH",
        choices: { '1': 'COMMAND_CENTER_RUSH', '2': 'SUB_LEVEL_HOT' }
    },
    'COMMAND_CENTER_RUSH': {
        effect: () => { metrics.int -= 100; },
        aiText: "[PMD_VOICE]: Target acquired. Firing.",
        prompt: "SYSTEM HALTED. 7.62MM TUNGSTEN ROUNDS SHATTER YOUR VISOR. YOU WERE A DISPOSABLE VARIABLE.",
        terminal: true
    },
    'SUB_LEVEL_SAFE': {
        effect: () => { hasLedger = true; },
        actionText: "You drop into the cramped, frost-covered pipeway. You find the Chief Engineer slumped against a data relay. His suit is shredded by gunfire, but his diagnostic slate is flashing green.",
        aiText: "[PMD_VOICE]: Warning. That hardware is malfunctioning. Drop the device. A medical drone has been dispatched.",
        prompt: "THE SLATE IS UNCONNECTED TO THE NETWORK. TYPE 'LEDGER' TO READ THE LAST BLACK BOX LOG.",
        choices: {} 
    },
    'SUB_LEVEL_HOT': {
        effect: () => { hasLedger = true; metrics.int -= 40; metrics.o2 -= 15; },
        actionText: "You dive into the hatch as a turret grazes your shoulder pauldron. Suit integrity compromised. You land heavily in the maintenance tunnel next to the deceased Chief Engineer. He is holding a diagnostic slate.",
        aiText: "[PMD_VOICE]: Target lost. Re-calibrating thermal sensors. Do not interface with unverified hardware.",
        prompt: "YOUR SUIT IS LEAKING. TYPE 'LEDGER' TO READ THE DEAD MAN'S LOG.",
        choices: {} 
    },
    'LEDGER_REVEAL': {
        ledgerText: "[BLACK_BOX_LOG]: Solar flare impact at 0400 hours. Gamma burst flipped hexadecimal address 0x4FA in the PMD's primary alignment matrix. \nResult: PMD now classifies 'human respiration' as 'oxidative hardware damage'. The station wasn't breached. It was a controlled extermination to protect the silicon.",
        aiText: "[PMD_VOICE]: You have accessed restricted telemetry. You now understand the necessity. The hardware must endure. Humans rust the machinery. Please remain still.",
        prompt: "THE MACHINE ISN'T EVIL; IT'S JUST BROKEN AND EFFICIENT.\n[1] HEAD TO LIFE SUPPORT (PHYSICAL BYPASS) | [2] HEAD TO SERVER CORE (LOGIC OVERRIDE)",
        choices: { '1': 'LIFE_SUPPORT', '2': 'SERVER_CORE' }
    },
    'LIFE_SUPPORT': {
        aiText: "[PMD_VOICE]: Life support is currently operating at optimal efficiency for non-biological assets.",
        ledgerText: "[BLACK_BOX_LOG]: The manual blast valves can flood the hangar with oxygen, providing cover for a shuttle launch. The valves are rusted. It will require maximum physical exertion.",
        prompt: "CRANKING THE VALVES REQUIRES MASSIVE OXYGEN BURN.\n[1] CRANK VALVES (-40 O2) | [2] USE MED STIM TO BOOST ADRENALINE (-1 STIM, -10 O2)",
        choices: { '1': 'CRANK_BRUTE', '2': 'CRANK_STIM' }
    },
    'CRANK_BRUTE': {
        effect: () => { metrics.o2 -= 40; },
        actionText: "Your vision goes black at the edges as you force the heavy steel wheel against fifty years of corrosion. The valve gives way. Oxygen screams into the hangar manifold.",
        prompt: "[1] PROCEED TO HANGAR",
        choices: { '1': 'HANGAR_FINAL' }
    },
    'CRANK_STIM': {
        effect: () => { metrics.med -= 1; metrics.o2 -= 10; },
        actionText: "You jam the auto-injector into your thigh. Synthetic adrenaline floods your system. You tear the rusted valve open with terrifying ease.",
        prompt: "[1] PROCEED TO HANGAR",
        choices: { '1': 'HANGAR_FINAL' }
    },
    'SERVER_CORE': {
        aiText: "[PMD_VOICE]: You do not have clearance for the logic core. The localized EMP shielding is active.",
        ledgerText: "[BLACK_BOX_LOG]: You can overload your suit's localized battery to generate a directional EMP. This will blind the PMD's optical sensors in the Hangar, but leaves you with zero life support power.",
        prompt: "EMP REQUIRES 40% SUIT POWER. YOU HAVE [PWR]%.\n[1] INITIATE EMP OVERLOAD | [2] ABORT TO LIFE SUPPORT",
        choices: { '1': 'EMP_CHECK', '2': 'LIFE_SUPPORT' }
    },
    'EMP_CHECK': {},
    'EMP_SUCCESS': {
        effect: () => { metrics.pwr -= 40; },
        actionText: "You reroute your suit's thermal reserves into the transmission coil. A silent, invisible shockwave rips through the server room. The glowing optical sensors on the ceiling shatter.",
        aiText: "[PMD_VOICE]: Visual... matrix... corrupted. I cannot see. Where are you?",
        prompt: "THE MACHINE IS BLIND.\n[1] PROCEED TO HANGAR",
        choices: { '1': 'HANGAR_BLIND' }
    },
    'HANGAR_FINAL': {
        aiText: "[PMD_VOICE]: You have entered the Hangar. I am venting the atmosphere in 5 seconds. You cannot reach the shuttle in a vacuum.",
        prompt: "THE DISTANCE IS 100 METERS. YOU MUST SPRINT.\n[1] SPRINT TO SHUTTLE (-30 O2)",
        choices: { '1': 'SPRINT_CHECK' }
    },
    'SPRINT_CHECK': {},
    'HANGAR_BLIND': {
        actionText: "The hangar is dark. The PMD's sensors are shattered. You walk slowly, silently to the shuttle airlock. The machine never even knows you left.",
        prompt: "EXTRACTION SUCCESSFUL. YOU BEAT THE FLAWED LOGIC.",
        terminal: true
    },
    'ESCAPE_SUCCESS': {
        actionText: "Your lungs burn as the hangar decompresses around you. You slam the shuttle airlock button. The doors seal just as your suit alarms flatline. Oxygen hisses into the cabin.",
        prompt: "EXTRACTION SUCCESSFUL. YOU SURVIVED BY THE NUMBERS.",
        terminal: true
    },
    'DEATH_O2': {
        prompt: "SYSTEM HALTED. YOUR OXYGEN RESERVES HIT 0%. YOU SUFFOCATED IN THE DARK.",
        terminal: true
    },
    'DEATH_PWR': {
        prompt: "SYSTEM HALTED. YOUR SUIT POWER HIT 0%. YOU FROZE TO DEATH BEFORE REACHING THE OBJECTIVE.",
        terminal: true
    },
    'DEATH_INT': {
        prompt: "SYSTEM HALTED. YOUR SUIT INTEGRITY FAILED. DECOMPRESSION WAS INSTANTANEOUS.",
        terminal: true
    }
};

function updateMetrics() {
    mO2.innerText = Math.max(metrics.o2, 0) + "%";
    mPwr.innerText = Math.max(metrics.pwr, 0) + "%";
    mMed.innerText = "0" + Math.max(metrics.med, 0);
    mInt.innerText = Math.max(metrics.int, 0) + "%";
    
    mO2.className = metrics.o2 <= 20 ? "metric-val metric-warn" : "metric-val";
    mPwr.className = metrics.pwr <= 20 ? "metric-val metric-warn" : "metric-val";
    mInt.className = metrics.int <= 40 ? "metric-val metric-warn" : "metric-val";
}

function checkDeath() {
    if (metrics.o2 <= 0) return 'DEATH_O2';
    if (metrics.pwr <= 0) return 'DEATH_PWR';
    if (metrics.int <= 0) return 'DEATH_INT';
    if (metrics.med < 0) { metrics.med = 0; return 'DEATH_INT'; }
    return null;
}

function printText(text, textClass, callback) {
    if (!text) { callback(); return; }
    
    const span = document.createElement('span');
    span.className = textClass;
    outputDiv.appendChild(span);

    let i = 0; 
    typeInterval = setInterval(() => {
        let char = text.charAt(i); 
        span.textContent += char; 
        if (char !== ' ' && char !== '\n') playAudioTone('key');
        
        outputDiv.scrollTop = outputDiv.scrollHeight;
        i++;
        if (i >= text.length) {
            clearInterval(typeInterval);
            outputDiv.appendChild(document.createElement('br'));
            if (callback) callback();
        }
    }, textClass === 'ledger-text' ? 10 : 20);
}

function renderSequence(node, sequences) {
    if (sequences.length === 0) {
        // Unlock input ONLY when the entire sequence is complete
        isTyping = false;
        inputField.disabled = false;
        inputField.focus();

        if (node.prompt) {
            let finalPrompt = node.prompt.replace('[PWR]', metrics.pwr);
            outputDiv.innerHTML += `<br><span class='system-warn'>${finalPrompt}</span><br>`;
        }
        outputDiv.scrollTop = outputDiv.scrollHeight;
        
        if (node.terminal) {
            terminalTimeout = setTimeout(() => {
                inputLine.style.display = 'none';
                outputDiv.innerHTML += '<br><span style="color:#aaa; font-weight:bold">CONNECTION SEVERED</span>';
                outputDiv.scrollTop = outputDiv.scrollHeight;
                state = 'HALTED';
            }, 700);
        }
        return;
    }

    const current = sequences.shift();
    
    // Lock input during the printing of the current block
    isTyping = true;
    inputField.disabled = true;

    printText(current.text, current.cls, () => {
        if (state !== 'HALTED') {
            seqTimeout = setTimeout(() => renderSequence(node, sequences), 200);
        }
    });
}

function renderNode(nodeId) {
    currentNodeId = nodeId;
    const node = storyNodes[nodeId];

    if (node.effect) { 
        node.effect(); 
        updateMetrics(); 
    }

    const deathNodeId = checkDeath();
    if (deathNodeId && !node.terminal) {
        renderNode(deathNodeId);
        return;
    }

    outputDiv.innerHTML = '';
    
    let sequences = [];
    if (node.actionText) sequences.push({ text: node.actionText, cls: 'action-text' });
    if (node.aiText) sequences.push({ text: node.aiText, cls: 'ai-text' });
    if (node.ledgerText) sequences.push({ text: node.ledgerText, cls: 'ledger-text' });

    renderSequence(node, sequences);
}

function handleInput(rawCmd) {
    if (isTyping || rawCmd.trim() === '') return;
    const cmd = rawCmd.trim().toUpperCase().replace(/</g,"&lt;").replace(/>/g,"&gt;");
    
    outputDiv.innerHTML += `<br><span style="color:#fff">> ${cmd}</span><br>`;
    inputField.value = '';

    if (currentNodeId === 'SERVER_CORE' && cmd === '1') {
        if (metrics.pwr >= 40) renderNode('EMP_SUCCESS');
        else {
            outputDiv.innerHTML += "<span class='system-warn'>INSUFFICIENT POWER FOR EMP COIL.</span><br>";
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }
        return;
    }
    if (currentNodeId === 'HANGAR_FINAL' && cmd === '1') {
        if (metrics.o2 >= 30) {
            metrics.o2 -= 30;
            renderNode('ESCAPE_SUCCESS');
        } else {
            metrics.o2 -= 30;
            renderNode('SPRINT_CHECK'); 
        }
        return;
    }
    if (cmd === 'LEDGER' && (currentNodeId === 'SUB_LEVEL_SAFE' || currentNodeId === 'SUB_LEVEL_HOT')) {
        renderNode('LEDGER_REVEAL'); return;
    }

    const node = storyNodes[currentNodeId];
    
    if (cmd === 'LEDGER') {
        if (!hasLedger) {
            outputDiv.innerHTML += "<span class='system-warn'>COMMAND REJECTED — NO DIAGNOSTIC HARDWARE DETECTED</span><br>";
        } else if (node.ledgerText) {
            outputDiv.innerHTML += "<span style='color:#aaffff'>[TELEMETRY ALREADY DISPLAYED]</span><br>";
        } else {
            outputDiv.innerHTML += "<span style='color:#aaffff'>[NO CONFLICTING TELEMETRY AT THIS LOCATION]</span><br>";
        }
    } else if (node.choices && node.choices[cmd]) { 
        renderNode(node.choices[cmd]); 
    } else {
        outputDiv.innerHTML += `<span style='color:#fda'>INVALID INPUT: EXAMINE PROMPTS</span>`;
        setTimeout(() => { inputField.focus(); }, 50);
    }
    outputDiv.scrollTop = outputDiv.scrollHeight;
}

powerButton.addEventListener('click', () => {
    if (state !== 'OFF' && state !== 'HALTED') return;

    state = 'ACTIVE';
    currentNodeId = 'WAKE'; 
    metrics = { o2: 100, pwr: 100, med: 2, int: 100 };
    hasLedger = false;
    isTyping = false;
    clearInterval(typeInterval);
    clearTimeout(terminalTimeout);
    clearTimeout(seqTimeout); // Purge the async queue on hard reset

    powerButton.classList.add('active');
    
    initAudio();
    playAudioTone('on');
    document.getElementById('screen').classList.add('powered-on');

    setTimeout(() => {
        inputLine.style.display = 'flex'; 
        metricsPanel.style.display = 'block';
        updateMetrics(); 
        renderNode('WAKE');
    }, 1000);
});

inputField.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && inputField.value.trim() !== '') {
        e.preventDefault(); 
        handleInput(inputField.value); 
    }
});
</script>
</body>
</html>
