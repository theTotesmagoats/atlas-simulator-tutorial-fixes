<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Mk VI - Archimedes Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background-color:#010409; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:'VT323',monospace; overflow:hidden; user-select:none; }
        
        #chassis { 
            background-color:#0a0d12; width:96vw; height:96vh; padding:30px; 
            border-radius:8px; box-sizing:border-box; 
            box-shadow:inset 0 0 40px #000, 0 0 60px rgba(0,229,255,0.08); 
            border:6px solid #11171d; 
            display:flex; flex-direction:column; 
        }
        
        #screen { 
            flex:1; min-height:0; background:#02060b; border-radius:4px; padding:30px; 
            box-sizing:border-box; box-shadow:inset 0 0 80px rgba(0,0,0,1); 
            border:2px solid #1a2b3c; position:relative; overflow:hidden; 
            display:flex; flex-direction:column; color:#00e5ff; 
            text-shadow:0 0 2px #00e5ff, 0 0 5px rgba(0, 229, 255, 0.3); 
            font-size:1.5rem; letter-spacing:1.2px; opacity:0; 
            transition:opacity 1.5s ease-in; 
        }
        
        #screen.powered-on { opacity:1; }
        #screen::after { content:" "; display:block; position:absolute; top:0; left:0; bottom:0; right:0; background:linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%); z-index:4; background-size:100% 3px; pointer-events:none; }
        #screen::before { content:" "; display:block; position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.85) 100%); z-index:5; pointer-events:none; }
        
        /* HARDWARE VOLATILITY CSS */
        .glitch-anim { animation: rgbShift 0.1s infinite alternate, skewGlitch 0.2s infinite alternate; }
        @keyframes rgbShift {
            0% { text-shadow: 3px 0 0 #ff0000, -3px 0 0 #0000ff; }
            100% { text-shadow: -3px 0 0 #ff0000, 3px 0 0 #0000ff; }
        }
        @keyframes skewGlitch {
            0% { transform: skewX(2deg); }
            100% { transform: skewX(-2deg); }
        }
        
        #top-metrics { position:absolute; top:30px; right:30px; text-align:right; font-size:1.4rem; color:#4a8b99; z-index:10; display:none; border:1px solid #1a2b3c; padding:10px 15px; background:rgba(2,6,11,0.8); box-shadow:0 0 10px rgba(0,0,0,0.5); }
        .metric-row { margin-bottom:5px; }
        .metric-val { color:#5bc0de; font-weight:bold; transition: color 0.3s; }
        .metric-warn { color:#ff4444 !important; animation:blinker 1s infinite; text-shadow:0 0 5px #ff4444; }
        
        #center-warning {
            display:none; position:absolute; top:30px; left:50%; transform:translateX(-50%);
            color:#ff4444; font-size:2.5rem; font-weight:bold; z-index:20; 
            text-shadow:0 0 15px #ff0000; border: 2px solid #ff4444; padding: 5px 20px;
            background: rgba(20, 0, 0, 0.8);
        }

        #output { flex-grow:1; overflow-y:auto; white-space:pre-wrap; margin-bottom:10px; padding-right:250px; z-index:3; line-height:1.3; }
        
        #input-line { display:none; align-items:center; font-weight:bold; z-index:3; margin-bottom:5px; flex-shrink:0; }
        #prompt { margin-right:15px; color:#00e5ff; }
        #cmd { background:transparent; border:none; color:inherit; font-family:'VT323',monospace; font-size:1em; flex-grow:1; outline:none; text-transform:uppercase; text-shadow:inherit; }
        input:-webkit-input-placeholder { text-transform:none !important; }
        
        #command-bar {
            display: none; flex-shrink: 0; z-index: 10;
            border-top: 1px dashed #1a2b3c; padding-top: 15px; margin-top: 5px;
            gap: 25px; font-size: 1.2rem; color: #4a8b99; justify-content: center;
        }
        .cmd-ref { position: relative; cursor: help; color: #00e5ff; font-weight: bold; }
        .cmd-ref::before {
            content: attr(data-hint);
            position: absolute; bottom: 150%; left: 50%; transform: translateX(-50%);
            background: #02060b; border: 1px solid #5bc0de; color: #5bc0de;
            padding: 8px 12px; white-space: nowrap; font-size: 1rem;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
            z-index: 20; box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .cmd-ref:hover::before { opacity: 1; }

        #hardware-panel { 
            flex-shrink:0; height:40px; margin-top:20px; 
            display:flex; justify-content:flex-end; align-items:center; gap:15px; 
        }
        
        .panel-label { color:#3a5b6c; font-family:sans-serif; font-size:0.8rem; font-weight:bold; letter-spacing:2px;}
        #power-button { width:30px; height:30px; background:#0b1d29; border-radius:50%; box-shadow:inset 2px 2px 4px #15354a, inset -2px -2px 4px #040a0f, 0 0 5px #000; color:#061118; font-family:sans-serif; font-size:14px; display:flex; justify-content:center; align-items:center; cursor:pointer; }
        #power-button.active { color:#00e5ff; text-shadow:0 0 5px #00e5ff; box-shadow:inset 2px 2px 5px #040a0f; transform:scale(0.95); }
        
        .ai-text { color:#5bc0de; }
        .ledger-text { color:#ffab00; text-shadow:0 0 3px #ffab00; font-weight:bold; }
        .system-warn { color:#ff4444; text-shadow:0 0 4px #ff4444; }
        .action-text { color:#aaffff; font-style:italic; }
        .critical-err { color:#ff0000; font-weight:bold; text-shadow:0 0 6px #ff0000; }
        @keyframes blinker { 50% { opacity:0; } }
    </style>
</head>
<body>
<div id="chassis">
    <div id="screen">
        <div id="center-warning">LOCK-ON: 12.0s</div>
        <div id="top-metrics">
            <div class="metric-row">O2 RESERVE: <span id="m-o2" class="metric-val">100%</span></div>
            <div class="metric-row">SUIT PWR: <span id="m-pwr" class="metric-val">100%</span></div>
            <div class="metric-row">MED_STIMS: <span id="m-med" class="metric-val">02</span></div>
            <div class="metric-row">INTEGRITY: <span id="m-int" class="metric-val">100%</span></div>
        </div>
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">INPUT></span>
            <input type="text" id="cmd" autocomplete="off">
        </div>
        <div id="command-bar">
            <span class="cmd-ref" data-hint="Execute specific contextual actions displayed in brackets.">[ACTION]</span>
            <span class="cmd-ref" data-hint="Analyze physical surroundings for structural/environmental details.">OBSERVE</span>
            <span class="cmd-ref" data-hint="Extract raw, unaligned telemetry from local air-gapped hardware.">LEDGER</span>
            <span class="cmd-ref" data-hint="Input X and Y coordinates to execute a manual firing solution.">TARGET [X] [Y]</span>
            <span class="cmd-ref" data-hint="Display system command reference and active syntax.">HELP</span>
        </div>
    </div>
    <div id="hardware-panel">
        <span class="panel-label">SYS BOOT</span>
        <div id="power-button">⏻</div>
    </div>
</div>

<script>
const outputDiv = document.getElementById('output');
const inputField = document.getElementById('cmd');
const inputLine = document.getElementById('input-line');
const metricsPanel = document.getElementById('top-metrics');
const commandBar = document.getElementById('command-bar');
const powerButton = document.getElementById('power-button');
const centerWarning = document.getElementById('center-warning');

const mO2 = document.getElementById('m-o2'), mPwr = document.getElementById('m-pwr'), 
      mMed = document.getElementById('m-med'), mInt = document.getElementById('m-int');

let state = 'OFF';
let isTyping = false;
let hasLedger = false;
let terminalTimeout;
let typeInterval;
let seqTimeout; 
let radarInterval;

// Volatility Engine Variables
let systemStability = 0; // 0: Broken, 1: Bypassed, 2: Stable
let glitchTimeout = null;

let metrics = { o2: 100, pwr: 100, med: 2, int: 100 };

// Radar Minigame Variables
let targetX = 0;
let targetY = 0;
let radarTime = 0;

let audioCtx;
let clickBuffer = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const bufferSize = audioCtx.sampleRate * 0.05; 
        
        const offlineCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, bufferSize, audioCtx.sampleRate);
        const noiseBuffer = offlineCtx.createBuffer(1, bufferSize, offlineCtx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        
        const noiseSource = offlineCtx.createBufferSource();
        noiseSource.buffer = noiseBuffer;
        
        const filter = offlineCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1400; 
        filter.Q.value = 1.2;
        
        const gainNode = offlineCtx.createGain();
        gainNode.gain.setValueAtTime(0.4, 0);
        gainNode.gain.exponentialRampToValueAtTime(0.001, 0.03);
        
        noiseSource.connect(filter).connect(gainNode).connect(offlineCtx.destination);
        noiseSource.start(0);
        
        offlineCtx.startRendering().then(renderedBuffer => { clickBuffer = renderedBuffer; });
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playAudioTone(type) {
    if (!audioCtx || audioCtx.state === 'suspended') return;
    const t = audioCtx.currentTime;
    
    if (type === 'on') {
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain).connect(audioCtx.destination);
        osc.type = 'square'; 
        osc.frequency.setValueAtTime(80, t); 
        osc.frequency.exponentialRampToValueAtTime(10, t + 0.15);
        gain.gain.setValueAtTime(0.5, t); 
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
    } else if (type === 'key' && clickBuffer) {
        const source = audioCtx.createBufferSource();
        source.buffer = clickBuffer;
        source.playbackRate.value = 0.8 + Math.random() * 0.4; 
        source.connect(audioCtx.destination);
        source.start(t);
    } else if (type === 'player_key' && clickBuffer) {
        const source = audioCtx.createBufferSource();
        source.buffer = clickBuffer;
        source.playbackRate.value = 0.5 + Math.random() * 0.3; 
        source.connect(audioCtx.destination);
        source.start(t);
    } else if (type === 'alarm') {
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain).connect(audioCtx.destination);
        osc.type = 'sawtooth'; 
        osc.frequency.setValueAtTime(300, t); 
        osc.frequency.linearRampToValueAtTime(400, t + 0.1);
        gain.gain.setValueAtTime(0.2, t); 
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
        osc.start(t); osc.stop(t + 0.2);
    } else if (type === 'glitch' && clickBuffer) {
        const source = audioCtx.createBufferSource();
        source.buffer = clickBuffer;
        source.loop = true;
        source.playbackRate.value = 0.2 + Math.random() * 0.5; 
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 300 + Math.random() * 2000;
        
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.8, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
        
        source.connect(filter).connect(gain).connect(audioCtx.destination);
        source.start(t);
        source.stop(t + 0.4);
    }
}

function scheduleGlitch() {
    if (systemStability >= 2 || state !== 'ACTIVE') return;
    let delay = systemStability === 0 ? 4000 + Math.random() * 4000 : 8000 + Math.random() * 5000;
    clearTimeout(glitchTimeout);
    glitchTimeout = setTimeout(triggerGlitch, delay);
}

function triggerGlitch() {
    if (systemStability >= 2 || state !== 'ACTIVE') return;
    
    if (isTyping) {
        glitchTimeout = setTimeout(triggerGlitch, 1000);
        return;
    }
    
    isTyping = true;
    inputField.disabled = true;
    
    let glitchChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()<>{}[]X";
    let span = document.createElement('span');
    span.className = 'critical-err';
    outputDiv.appendChild(document.createElement('br'));
    outputDiv.appendChild(span);
    
    document.getElementById('screen').classList.add('glitch-anim');
    playAudioTone('glitch');
    
    let count = 0;
    let maxCount = systemStability === 0 ? Math.floor(Math.random() * 40 + 30) : Math.floor(Math.random() * 15 + 10);
    
    let gInterval = setInterval(() => {
        span.textContent += glitchChars.charAt(Math.floor(Math.random() * glitchChars.length));
        outputDiv.scrollTop = outputDiv.scrollHeight;
        count++;
        
        if (count >= maxCount) {
            clearInterval(gInterval);
            span.textContent += " [BUS_RECOVERED]";
            document.getElementById('screen').classList.remove('glitch-anim');
            outputDiv.appendChild(document.createElement('br'));
            
            isTyping = false;
            inputField.disabled = false;
            inputField.focus();
            scheduleGlitch();
        }
    }, 15);
}

    'HANGAR_FINAL': {
        aiText: "[PMD_VOICE]: You have entered the Hangar. I am venting the atmosphere in 5 seconds. You cannot reach the shuttle in a vacuum.",
        observeText: "The shuttle sits 100 meters across the open grid. The launch sequence is primed. The hangar bay doors are beginning to cycle open to the vacuum of space.",
        prompt: "THE DISTANCE IS 100 METERS.\nAVAILABLE: [SPRINT TO SHUTTLE] (-30 O2)",
        commands: { 'SPRINT TO SHUTTLE': 'SPRINT_CHECK' }
    },
    'SPRINT_CHECK': {},
    'HANGAR_BLIND': {
        actionText: "The hangar is pitch black. The PMD's shattered sensors hang dead from their mounts. Heavy boots step silently across the grid to the shuttle airlock.",
        prompt: "EXTRACTION SUCCESSFUL. THE FLAWED LOGIC WAS DEFEATED.",
        terminal: true
    },
    'ESCAPE_SUCCESS': {
        actionText: "The air violently evacuates the hangar, tearing loose debris into the void. The shuttle airlock cycles shut just as the suit's internal pressure alarms hit zero. Thick, synthetic oxygen hisses from the cabin vents.",
        prompt: "EXTRACTION SUCCESSFUL. THE METRICS WERE BALANCED.",
        terminal: true
    },
    'DEATH_O2': {
        prompt: "SYSTEM HALTED. OXYGEN RESERVES DEPLETED. ASPHYXIATION IMMINENT.",
        terminal: true
    },
    'DEATH_PWR': {
        prompt: "SYSTEM HALTED. SUIT POWER DEPLETED. CORE TEMPERATURE DROPPING RAPIDLY.",
        terminal: true
    },
    'DEATH_INT': {
        prompt: "SYSTEM HALTED. SUIT INTEGRITY FAILED. DECOMPRESSION WAS INSTANTANEOUS.",
        terminal: true
    }
};

function updateMetrics() {
    mO2.innerText = Math.max(metrics.o2, 0) + "%";
    mPwr.innerText = Math.max(metrics.pwr, 0) + "%";
    mMed.innerText = "0" + Math.max(metrics.med, 0);
    mInt.innerText = Math.max(metrics.int, 0) + "%";
    
    mO2.className = metrics.o2 <= 20 ? "metric-val metric-warn" : "metric-val";
    mPwr.className = metrics.pwr <= 20 ? "metric-val metric-warn" : "metric-val";
    mInt.className = metrics.int <= 40 ? "metric-val metric-warn" : "metric-val";
}

function checkDeath() {
    if (metrics.o2 <= 0) return 'DEATH_O2';
    if (metrics.pwr <= 0) return 'DEATH_PWR';
    if (metrics.int <= 0) return 'DEATH_INT';
    if (metrics.med < 0) { metrics.med = 0; return 'DEATH_INT'; }
    return null;
}

function startRadarMinigame() {
    state = 'RADAR_ACTIVE';
    targetX = Math.floor(Math.random() * 6) + 2; 
    targetY = Math.floor(Math.random() * 6) + 1; 
    radarTime = 12.0;
    
    centerWarning.style.display = 'block';
    
    radarInterval = setInterval(() => {
        radarTime -= 0.1;
        centerWarning.innerText = "LOCK-ON: " + Math.max(0, radarTime).toFixed(1) + "s";
        playAudioTone('alarm');
        
        if(radarTime <= 0) {
            clearInterval(radarInterval);
            centerWarning.style.display = 'none';
            renderNode('DEATH_TURRET');
        }
    }, 100);

    let grid = "   0 1 2 3 4 5 6 7\n";
    for(let y=0; y<8; y++) {
        grid += " " + y + " ";
        for(let x=0; x<8; x++) {
            if(x===0 && y===0) grid += "<span style='color:#00e5ff'>U</span> ";
            else if(x===targetX && y===targetY) grid += "<span style='color:#ff4444'>T</span> ";
            else grid += "<span style='color:#3a5b6c'>.</span> ";
        }
        grid += "\n";
    }
    
    outputDiv.innerHTML += `<br><span class='system-warn'>MANUAL TARGETING ACTIVE. INPUT FIRING SOLUTION.</span><br><br><span style='font-family: monospace; white-space: pre; line-height:1.2;'>${grid}</span><br><span class='action-text'>INPUT: TARGET [X] [Y]</span><br>`;
    outputDiv.scrollTop = outputDiv.scrollHeight;
    
    isTyping = false;
    inputField.disabled = false;
    inputField.focus();
}

function printText(text, textClass, callback) {
    if (!text) { callback(); return; }
    
    const span = document.createElement('span');
    span.className = textClass;
    if (text.includes("[CRITICAL_ERR")) span.classList.add("critical-err");
    
    outputDiv.appendChild(span);

    let i = 0; 
    let charCount = 0;
    typeInterval = setInterval(() => {
        let char = text.charAt(i); 
        span.textContent += char; 
        
        charCount++;
        if (char !== ' ' && char !== '\n' && charCount % 2 === 0) playAudioTone('key');
        
        outputDiv.scrollTop = outputDiv.scrollHeight;
        i++;
        if (i >= text.length) {
            clearInterval(typeInterval);
            outputDiv.appendChild(document.createElement('br'));
            if (callback) callback();
        }
    }, textClass === 'ledger-text' ? 15 : 25);
}

function renderSequence(node, sequences) {
    if (sequences.length === 0) {
        if (currentNodeId === 'RADAR_INIT') {
            startRadarMinigame();
            return;
        }

        isTyping = false;
        inputField.disabled = false;
        inputField.focus();

        if (node.prompt) {
            let finalPrompt = node.prompt.replace('[PWR]', metrics.pwr);
            outputDiv.innerHTML += `<br><span class='system-warn'>${finalPrompt}</span><br>`;
        }
        outputDiv.scrollTop = outputDiv.scrollHeight;
        
        if (node.terminal) {
            terminalTimeout = setTimeout(() => {
                inputLine.style.display = 'none';
                commandBar.style.display = 'none';
                outputDiv.innerHTML += '<br><span style="color:#aaa; font-weight:bold">CONNECTION SEVERED</span>';
                outputDiv.scrollTop = outputDiv.scrollHeight;
                state = 'HALTED';
            }, 700);
        }
        return;
    }

    const current = sequences.shift();
    
    isTyping = true;
    inputField.disabled = true;

    printText(current.text, current.cls, () => {
        if (state !== 'HALTED') {
            seqTimeout = setTimeout(() => renderSequence(node, sequences), 200);
        }
    });
}

function renderNode(nodeId) {
    currentNodeId = nodeId;
    const node = storyNodes[nodeId];

    if (node.effect) { 
        node.effect(); 
        updateMetrics(); 
    }

    const deathNodeId = checkDeath();
    if (deathNodeId && !node.terminal) {
        renderNode(deathNodeId);
        return;
    }

    outputDiv.innerHTML = '';
    
    let sequences = [];
    if (node.actionText) sequences.push({ text: node.actionText, cls: 'action-text' });
    if (node.aiText) sequences.push({ text: node.aiText, cls: 'ai-text' });
    if (node.ledgerText) sequences.push({ text: node.ledgerText, cls: 'ledger-text' });

    renderSequence(node, sequences);
}

function handleInput(rawCmd) {
    if (isTyping || rawCmd.trim() === '') return;
    
    // Strip brackets from user input if they typed them, for cleaner parsing
    let cleanInput = rawCmd.trim().toUpperCase().replace(/\[/g, "").replace(/\]/g, "");
    
    outputDiv.innerHTML += `<br><span style="color:#fff">> ${cleanInput}</span><br>`;
    inputField.value = '';

    if (state === 'RADAR_ACTIVE') {
        const match = cleanInput.match(/^TARGET\s+(\d)\s+(\d)$/);
        if (match) {
            let pX = parseInt(match[1]);
            let pY = parseInt(match[2]);
            if (pX === targetX && pY === targetY) {
                clearInterval(radarInterval);
                centerWarning.style.display = 'none';
                state = 'ACTIVE';
                renderNode('TURRET_DESTROYED');
            } else {
                outputDiv.innerHTML += "<span class='system-warn'>CALIBRATION MISS. ADJUST X Y COORDINATES.</span><br>";
            }
        } else {
            outputDiv.innerHTML += "<span style='color:#fda'>SYNTAX ERROR. USE: TARGET X Y</span><br>";
        }
        outputDiv.scrollTop = outputDiv.scrollHeight;
        return;
    }

    const node = storyNodes[currentNodeId];

    // Global Command: OBSERVE
    if (cleanInput === 'OBSERVE') {
        isTyping = true;
        inputField.disabled = true;
        
        let obsText = node.observeText ? node.observeText : "No structural anomalies detected in immediate vicinity.";
        printText(obsText, 'action-text', () => {
            isTyping = false;
            inputField.disabled = false;
            inputField.focus();
            let finalPrompt = node.prompt ? node.prompt.replace('[PWR]', metrics.pwr) : "";
            outputDiv.innerHTML += `<br><span class='system-warn'>${finalPrompt}</span><br>`;
            outputDiv.scrollTop = outputDiv.scrollHeight;
        });
        return;
    }

    // Global Command: HELP
    if (cleanInput === 'HELP') {
        commandBar.style.display = 'flex';
        if (currentNodeId === 'OS_BOOT') {
            renderNode('CONCUSSION_WAKE');
        } else {
            outputDiv.innerHTML += "<span style='color:#aaffff'>[SYSTEM: COMMAND INTERFACE ACTIVE]</span><br>";
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }
        return;
    }

    if (currentNodeId === 'OS_BOOT') {
        outputDiv.innerHTML += "<span class='system-warn'>COMMAND REJECTED. TYPE 'HELP' TO PROCEED.</span><br>";
        outputDiv.scrollTop = outputDiv.scrollHeight;
        return;
    }

    // Dynamic Logic Override Checks
    if (currentNodeId === 'SERVER_CORE' && cleanInput === 'INITIATE EMP') {
        if (metrics.pwr >= 40) renderNode('EMP_SUCCESS');
        else {
            outputDiv.innerHTML += "<span class='system-warn'>INSUFFICIENT POWER FOR EMP COIL.</span><br>";
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }
        return;
    }
    if (currentNodeId === 'HANGAR_FINAL' && cleanInput === 'SPRINT TO SHUTTLE') {
        if (metrics.o2 >= 30) {
            metrics.o2 -= 30;
            renderNode('ESCAPE_SUCCESS');
        } else {
            metrics.o2 -= 30;
            renderNode('SPRINT_CHECK'); 
        }
        return;
    }
    if (currentNodeId === 'CORRIDOR_RUN' && cleanInput === 'RETURN FIRE') {
        renderNode('RADAR_INIT');
        return;
    }
    if (cleanInput === 'LEDGER' && (currentNodeId === 'SUB_LEVEL_SAFE' || currentNodeId === 'SUB_LEVEL_HOT')) {
        renderNode('LEDGER_REVEAL'); return;
    }
    
    if (cleanInput === 'LEDGER') {
        if (!hasLedger) {
            outputDiv.innerHTML += "<span class='system-warn'>COMMAND REJECTED — NO DIAGNOSTIC HARDWARE DETECTED</span><br>";
        } else if (node.ledgerText) {
            outputDiv.innerHTML += "<span style='color:#aaffff'>[TELEMETRY ALREADY DISPLAYED]</span><br>";
        } else {
            outputDiv.innerHTML += "<span style='color:#aaffff'>[NO CONFLICTING TELEMETRY AT THIS LOCATION]</span><br>";
        }
        outputDiv.scrollTop = outputDiv.scrollHeight;
        return;
    } 

    // Explicit Node Commands Processing
    if (node.commands && node.commands[cleanInput]) { 
        renderNode(node.commands[cleanInput]); 
    } else {
        outputDiv.innerHTML += `<span style='color:#fda'>INVALID SYNTAX: EXAMINE AVAILABLE [COMMANDS] OR TYPE 'OBSERVE'.</span>`;
        setTimeout(() => { inputField.focus(); }, 50);
    }
    outputDiv.scrollTop = outputDiv.scrollHeight;
}

powerButton.addEventListener('click', () => {
    if (state !== 'OFF' && state !== 'HALTED') return;

    state = 'ACTIVE';
    currentNodeId = 'OS_BOOT'; 
    metrics = { o2: 100, pwr: 100, med: 2, int: 100 };
    hasLedger = false;
    isTyping = false;
    systemStability = 0;
    
    clearInterval(typeInterval);
    clearTimeout(terminalTimeout);
    clearTimeout(seqTimeout); 
    clearInterval(radarInterval);
    clearTimeout(glitchTimeout);
    centerWarning.style.display = 'none';

    powerButton.classList.add('active');
    commandBar.style.display = 'none'; 
    
    initAudio();
    playAudioTone('on');
    document.getElementById('screen').classList.add('powered-on');

    setTimeout(() => {
        inputLine.style.display = 'flex'; 
        metricsPanel.style.display = 'block';
        updateMetrics(); 
        renderNode('OS_BOOT');
        scheduleGlitch();
    }, 1800);
});

inputField.addEventListener('keydown', function(e) {
    if ((e.key.length === 1 || e.key === 'Backspace') && state !== 'OFF' && state !== 'HALTED') {
        playAudioTone('player_key');
    }
    
    if (e.key === 'Enter' && inputField.value.trim() !== '') {
        e.preventDefault(); 
        handleInput(inputField.value); 
    }
});
</script>
</body>
