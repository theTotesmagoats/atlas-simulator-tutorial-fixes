<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOON_BASE_TERMINAL v2 • AIRLOCK A-7</title>
    <style>
        /* === FULLSCREEN TERMINAL UI (CRT MODE) === */
        body {
            margin: 0; 
            background: #0a0c08;
            color: #e9f4cf; 
            font-family: 'Courier New', monospace;
            overflow: hidden; /* full screen */
        }

        /* The main window, full screen, centered with subtle borders */
        #terminal {
            position: fixed;
            top: 2vh; left: 2vw; right: 2vw; bottom: 6vh;
            padding: 1.5rem; 
            background: linear-gradient(180deg,
                        #171914, /* deep monitor black */
                        #11130f
                      );
            border: 3px double rgba(126,145,118, 0.9);
            border-radius: 1.8rem;
            box-shadow:
                inset 0 0 250px #0b0e07,
                0 0 5vw rgba(0,255,90,0.12);
        }
        
        /* CRT scanlines and bloom glow */
        #terminal::after {
            content:"";
            position: absolute; inset:0;
            pointer-events: none; 
            background: linear-gradient(to bottom, 
                        rgba(255,255,255,0.04) 1px, 
                        transparent 1px),
                        linear-gradient(90deg, 
                        rgba(255,255,255,0.03) 1px,
                        transparent 1px);
            background-size: 100% 3px, 4px 100%;
            border-radius: inherit;
        }
        /* screen curvature glow */
        #terminal::before {
            content:"";
            position:absolute; inset:-6px; pointer-events:none; 
            background: radial-gradient(ellipse at center,
                    rgba(0,0,0,0) 48%, rgba(100,255,90,0.04) 82%);
            border-radius: inherit;
            z-index: -1;
        }
        
        /* Screen flicker effect (gentle but persistent) */
        @keyframes flicker {
            0%   {opacity: .99; }
            2%   {opacity: .93; }
            4%   {opacity: .97; }
            100% {opacity: .99; }
        }
        #boot, #history, #input-line {
            animation: flicker 8s infinite;
            white-space: pre-wrap;
        }
        
        #boot { display: flex; flex-direction: column; gap:5px;}
        
        #status-bar {
            margin-top:1.5rem; padding:6px; font-weight:bold;
            color: #8ab9ff;
            background: rgba(0,40,24, 0.6);
            border: 1px solid rgba(0,180,90, 0.5); border-radius:4px;
        }

        /* Input line styling (terminal feel) */
        #input-line { 
            margin-top:auto; display:flex; padding: 8px;
            background:rgba(0,0,0,0.7); 
            font-size:1rem; align-items:center;
        }
        .prompt {
            color:#4caf50; font-weight:bold; margin-right:10px;
        }
        input {
            flex-grow:1;
            border:none; outline:none; background:transparent;
            color:white; font-family:"Courier New"; font-size: 1.1rem;
            caret-color:#aef; padding:4px;
        }

        .message { margin-bottom:6px; display:block; line-height:1.5;}
        .sys-msg { color:#4caf50; }   /* green = system */
        .warn-text { color: #ffd700; text-shadow: 0 1px 3px #a68200; } 
        .hint-msg { color:#cfe7ff; font-style: italic; opacity:.8;}

    </style>
</head>

<body><div id="terminal">

<div id="boot">
<script>document.write(`
Initializing…<br/>
Memory Self-Check... PASS<br/>
System Clock Sync (UTC)... 0945 hrs.<br/>
Alert — E-L7 Triggered. Bulkheads Sealed.<br/>
Survivable Atmosphere: CONFIRMED.<br/>
Battery Backup: ACTIVE.<br/>
Security Override: ACTIVE
`.replace(/\n/g,'<br/>'));</script>
</div>

<!-- Status & history area -->
<div id="status-bar">
STATUS: <span class="status-indicator">O2 STABLE</span> 
| OXYGEN LEFT: <b><span id="oxygen-display" class="oxygen-val" style="color:#ffd700;">~3h 15m</span></b>
| COMMS STATUS: <b class="status-indicator">OFFLINE</b>
</div>

<!-- The story/history output (auto-scrolls) -->
<div id="history" style="
height: 58%;
overflow-y: auto; overflow-x:hidden;
padding-top:0.75rem;
font-size: 1.025rem;"></div>

<!-- User Input -->
<div id="input-line">
<span class="prompt">user@luna-airlockA7:~$</span>
<input type="text" id="player-input" placeholder="[Type something like 'look', then hit Enter]…" autofocus>
</div>

<!-- The terminal is ready — but input box has to receive focus for the user -->
<script>
// 1. Boot sequence delay so you're not overwhelmed  
function startBoot() {
    const bootEl = document.getElementById('boot');
    
    setTimeout(() => bootEl.innerHTML += '<br>[BOOT COMPLETE]\n> CONNECTION ESTABLISHED', 1050);
    
    setTimeout(() => { // give 2 seconds after that
        bootEl.innerHTML = "<i class='sys-msg'>[SYSTEM READY]</i>\n"; 
    }, 3400); // full intro over in ~3.4s
    
    addMessage("\n> ALERT: Airlock A-7 sealed at 03:42 UTC (Event L7).\nYou are the only survivor.", "warn");
    
    // 3-second warning before player sees main text
    setTimeout(() => {
        const msgDiv = document.getElementById("history");
        
        // The most important lines first:
        const welcomeText = [
            `[Airlock A-7 — Main Chamber]`,
            "\n• Bulkhead Door: Sealed. Warning Light Pulsing.",
            "• Comms Console: Standby LEDs flickering (RED)",
            "• Emergency Locker: Open, no magnets engaged.",
            "• Tablet Dock: Screen dark, power LED dead.\n\n"
        ];
        
        const nextLines = [
            "> WARNING: You have approximately 3 hours oxygen remaining.",
            "> SUGGESTED NEXT STEPS:", 
            ' • Type “look console” — examine the comms unit', 
            " • Check inventory or help for commands",
            "\n> HINTS appear when you hover over key words like *help*, *look*, or *inventory*.\n"
        ];
        
        welcomeText.forEach(l => msgDiv.innerHTML += `<span class="message sys-msg">${l}</span>\n`);
        
        setTimeout(() => {
            addMessage("What should you do?","hint"); // Direct instruction!
            
            // Focus the input so user can start typing immediately  
            const input = document.getElementById('player-input'); 
            input.focus(); // this line ensures user doesn't need to click
            
        }, 2100);

    }, 5400);
    
}

function addMessage(text, type="normal") {
    const container = document.getElementById("history");
    let className = "message"; 
    if (type==="warn") className+=" warn-text";
    else if (type==="system") className+=" sys-msg";
    else if (type==="hint") className += " hint-msg";
    
    // Create line break between entries  
    const p = document.createElement("span"); 
    p.innerHTML = `> ${text}`; // automatically prepends "> " for realism
    p.className=className;
    
    container.appendChild(p);
    container.scrollTop = container.scrollHeight; // auto scroll down
    
}

// Game logic parser (clean, simple, robust)
function handleInput(input) {
    const text = input.toLowerCase().trim();
    if (!text) { return; } 

    // Echo what was typed
    addMessage(`> ${input}`, 'system'); 
    setTimeout(() => {
        document.getElementById('player-input').value=''; // clear field for next input
    }, 80);

    // COMMAND ROUTER — easy to expand later
    const parts = text.split(/\s+/); 

    if (["help","h"].includes(parts[0])) {
        addMessage("[COMMAND REFERENCE]\n • look [thing] – see details\n" + 
                   " • use [item] – operate something (if you have it)\n" +
                   " • inventory/i – show what you carry", "sys");
        
    } else if (parts[0] === "look") {
        const target = parts.slice(1).join(' ');

        // 1. General look  
        if (!target) {
            addMessage("Look where? Try 'look console', 'look locker'...", "hint"); 
        }

        else if (target.includes("console")) {
            addMessage("[Comms Console] Screen flickers with a message:\n" +
                     "> FREQ: UNLOCKED / 357 MHz\n" +
                     "> T/R MODULE: OVERHEAT PROTECTION", "sys");
            window.clues = window.clues || {}; window.clues["freq"] = true;
        }
        
        else if (target.includes("tablet")) {
            addMessage("[Tablet Dock] Dark, power indicator OFF. The manual says:\n" + 
                      " ‘Low Battery — Emergency Reboot via USB or Battery Port’", "sys");
        }

        else if (target.includes("door") || target.includes("bulkhead")) {
            addMessage("[Bulkhead Door] Emergency Release Lever engaged. But no response.\n" +
                       "> SECURITY LOCK ACTIVE – AUTHORIZATION: ADMIN ONLY.", "warn"); 
        }

        else if (target.includes("locker")) {
            addMessage("[Emergency Locker] Magnets disengaged. Inside you find:\n • CO2 Scrubber (1 use)\n" +
                      "• Flashlight (heavy duty, 6hr runtime)\n• 9V Battery Backup", "sys");
            
            window.inventory = window.inventory || [];
            ["filter", "flashlight", "battery"].forEach(x => { 
                if (!window.inventory.includes(x)) window.inventory.push(x); 
            });
            addMessage("*You pick them up.* Now available: use [item]", "hint");  
        }
        
        else addMessage("You look around, but find nothing more notable.", "normal");
    }

    // Use item
    else if (parts[0] === "use") {
        
        const obj = parts.slice(1).join(' ');
        
        // 1. Use battery on console  
        if ((obj.includes("bat") && window.inventory?.includes("battery")) && 
           (obj.includes("con") || obj.includes("on")) ) {

            addMessage("*You connect the backup battery…*", "sys"); 

            setTimeout(() => {
                if (!window.clues) { window.clues = {}; } // make sure exists
                addMessage("[POWER UP SEQUENCE]\nLEDs shift from amber to solid GREEN.\nThe tablet dock wakes.", "sys");
                window.clues.powered_console=true;
                
                document.querySelector("#status-bar").innerHTML =
                    "STATUS: <span style='color:#aef'>POWER RESTORED</span> | " +
                    "<b>OXYGEN LEFT:</b> <span id=\"oxygen-display\" class=\"oxygen-val\">~3h 05m</span>" + 
                    "| COMMS: <span style='background:rgba(10,30,20,0.7);padding:0px 4px'>READY</span>";
                    
            }, 750);
        }
        
        // use battery on tablet  
        else if (obj.includes("bat") && window.inventory?.includes("battery")) {
            
            if (window.clues.powered_console) { 
                addMessage("*Tablet powers up, then locks down —*\n‘CRITICAL: POWER SOURCE UNSTABLE. RUN DIAGNOSTICS.’");
                document.querySelector("#status-bar").innerHTML = "STATUS: <span style='color:#fca'>POWER CRITICAL</span>";
            } else {
                addMessage("Nothing happens — the console needs power too.", "normal"); 
            }
        }
        
        // Use flashlight (you only need to have it)
        else if ((obj.includes("flashlight") || obj==="fl") && window.inventory?.includes("flashlight")) {

            setTimeout(() => {  
                addMessage("*Light cuts through the gloom.* You see loose wiring under Junction 5’s broken panel.", "sys");
                window.clues = window.clues || {};
                window.clues.wiringVisible=true;
            }, 600);
        }

        else if (obj.includes("filter") && window.inventory?.includes("filter")) {
            addMessage("*You replace the CO2 scrubber. Cycle completes.*", "sys");
            
            setTimeout(() => { 
                addMessage("Oxygen estimated extended: +90 minutes.\n" +
                           "You breathe a little easier.", "sys");
                
                if (!window.inventory.includes("empty_scubber")) {
                    window.inventory = window.inventory.filter(i => i!=="filter"); 
                }
            }, 800);
        }

        else {
            addMessage("*Nothing happens. Are you using the right item?", "normal");  
        }
    } 
    
    // Inventory
    else if (["i","inv"].includes(parts[0])) {
        if (!window.inventory || !Array.isArray(window.inventory) || window.inventory.length===0) 
             { addMessage("Inventory: Empty"); }
        else { 
            const items = window.inventory.map(x => `- ${x.replace("_", " ")}`);
            addMessage(`[Your Inventory] ${items.join('\n      ')}`,"sys");
        } 
    }

    // Transmitter — final progression
    else if (text.includes("transmit") || text==="send") {
        
        if (!window.clues || !window.clues.powered_console) {  
            addMessage("Nothing happens. The console is unpowered. Try connecting the backup battery.", "warn"); 
        }
        else if (!window.clues.wiringVisible) {  
             addMessage("*LEDs blink… but nothing transmits.*\n" + 
                        "Earth needs signal integrity: the cable at Junction 5 is frayed and sparking.\nYou need to see the wire. Try a flashlight.", "warn"); 
        }
        
        else if (window.clues.wiringVisible) {
            
            setTimeout(() => { 
                addMessage("TRANSMIT SEQUENCE:\n1. SET FREQUENCY: 357.0 MHz — [OK]", "system");
                addMessage("2. ESTABLISH LINK: Checking wire integrity…", "system");
                
                setTimeout(() => {
                    
                    // Now give player one more decision to *fix* the wiring (even if only descriptive)
                    addMessage(
                        "> SIGNAL PATH UNSTABLE.\n" +
                        "*The loose spool of red wire hums.* \nYou have 12 seconds to reconnect it—or lose your transmission forever.\n\nDo you attempt the bypass?", 
                        "warn");

                    setTimeout(() => {  
                        
                        addMessage("[SILENCE]\nThe airlock hisses — emergency venting begins.", "warn");
                        
                        // One final chance: say 'splice' or 'repair'  
                    }, 2100);
                    
                }, 950);
            }, 1600); 
        }
    } 
    
    else {
        addMessage("Command not recognized. Try typing ‘help’.", "normal"); 
    }
}

// Setup game start & event binding  
document.addEventListener('DOMContentLoaded', function() {

    const inputEl = document.getElementById('player-input'); 
    
    inputEl.addEventListener("keydown", function(e) {
        
        // Prevent Enter from scrolling the window or creating newlines
        if (e.key === 'Enter') { 
            e.preventDefault(); // stop new line
            handleInput(this.value);
            inputEl.value = "";
            this.focus(); // always keep focus  
        } else {
            // Auto-focus any time user starts typing again, for convenience
            this.focus();
        }
    });
    
    // Ensure the game window can be tabbed (if focus is lost somehow)
    document.getElementById("history").addEventListener('click', () => inputEl.focus());
    
    startBoot(); 
    
    // Give 6 seconds then focus automatically 
    setTimeout(() => inputEl.focus(), 4200);

});

</script>

<div style="display:none">
    <!-- Hidden placeholder so this script runs before the game logic starts -->
</div>
</div></body>
</html>
